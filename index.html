<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<style>
:root{--bg:#f4efe7;--paper:#fffdf9;--ink:#252422;--muted:#6e685f;--line:#ddd5c9;--accent:#2f6f62;--good:#1e744b;--bad:#aa4040}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}
.app{max-width:820px;margin:auto;padding:14px 14px 40px}
header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
h1{font-size:clamp(22px,5vw,32px);margin:0} .badge{background:#222;color:white;border-radius:999px;padding:7px 11px;font-size:12px;white-space:nowrap}
.settings{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
select,button{font:inherit} select{border:1px solid var(--line);background:#fff;border-radius:12px;padding:9px}
.btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;cursor:pointer} .primary{background:var(--accent);color:white} .secondary{background:#e9e3d9;color:var(--ink)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 12px 28px rgba(60,45,25,.08)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px} .stat{background:#f0ebe3;border-radius:13px;padding:9px;text-align:center;font-size:12px} .stat b{display:block;font-size:19px}
.progress{height:9px;background:#e7e0d5;border-radius:99px;overflow:hidden;margin:13px 0 18px} .progress div{height:100%;width:0;background:var(--accent);transition:.2s}
.qmeta{font-size:13px;color:var(--muted);font-weight:800} .sentence{font:clamp(21px,4.5vw,29px)/1.5 Georgia,"Times New Roman",serif;margin:12px 0 18px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:11px} .option{border:2px solid var(--line);background:white;border-radius:15px;padding:14px;text-align:left;font-size:16px;font-weight:750;min-height:58px;cursor:pointer}
.option.correct{border-color:var(--good);background:#eaf7ef;color:#145b39} .option.wrong{border-color:var(--bad);background:#fff0f0;color:#842f2f} .option.dim{opacity:.5}
.feedback{display:none;margin-top:15px;border-radius:15px;padding:14px;line-height:1.58} .feedback.show{display:block} .feedback.good{background:#eaf7ef;color:#145b39} .feedback.bad{background:#fff0f0;color:#792b2b}
.wrong-explain{margin-top:10px;padding-top:10px;border-top:1px solid rgba(120,40,40,.25)} .label{font-weight:900} .small{font-size:14px;color:#504b45}
.actions{display:flex;justify-content:space-between;gap:10px;margin-top:15px} .hidden{display:none!important}
.result{text-align:center} .score{font-size:56px;font-weight:900;color:var(--accent)} .wrong-list{text-align:left;margin-top:18px} .wrong-item{padding:11px 0;border-bottom:1px solid var(--line)}

.wrongbook-panel{margin-bottom:12px}
.wrongbook-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.wrongbook-count{font-weight:900;color:var(--bad)}
.wrongbook-list{margin-top:14px;display:grid;gap:10px}
.wrongbook-card{border:1px solid var(--line);border-radius:16px;padding:13px;background:#fffaf7;text-align:left}
.wrongbook-card .wb-sentence{font-family:Georgia,"Times New Roman",serif;font-size:18px;line-height:1.45;margin-bottom:8px}
.wrongbook-card .wb-row{font-size:14px;line-height:1.55}
.wrongbook-card .wb-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap}
.danger{background:#f3dede;color:#7d2525}

@media(max-width:620px){.options{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><div class="app">
<header><h1>📚 英文單字填空測驗</h1><span class="badge">352 題混合題庫</span></header>
<div class="settings">
<label>本輪題數 <select id="count">
<option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="50">50</option><option value="352" selected>352</option>
</select></label>
<button id="newRound" class="btn secondary">重新抽題</button>
</div>
<section id="wrongBookPanel" class="card wrongbook-panel">
  <div class="wrongbook-head">
    <div>
      <h2 style="margin:0 0 4px">📕 錯題整理</h2>
      <div class="small">答錯的題目會自動保存到這裡，重新開啟網頁也不會消失。</div>
    </div>
    <div>
      <span class="wrongbook-count" id="wrongBookCount">0 題</span>
    </div>
  </div>
  <div class="actions" style="justify-content:flex-start;margin-top:12px">
    <button id="practiceWrongBook" class="btn secondary">練習錯題本</button>
    <button id="viewWrongBook" class="btn secondary">查看錯題</button>
    <button id="clearWrongBook" class="btn danger">清空錯題本</button>
  </div>
  <div id="wrongBookList" class="wrongbook-list hidden"></div>
</section>
<section id="quiz" class="card">
<div class="stats"><div class="stat">進度<b id="progressText">0/0</b></div><div class="stat">答對<b id="correctText">0</b></div><div class="stat">連勝<b id="streakText">0</b></div><div class="stat">正確率<b id="rateText">0%</b></div></div>
<div class="progress"><div id="bar"></div></div>
<div class="qmeta" id="qmeta"></div><div class="sentence" id="sentence"></div><div class="options" id="options"></div>
<div id="feedback" class="feedback"></div>
<div class="actions"><button id="skip" class="btn secondary">跳過</button><button id="next" class="btn primary hidden">下一題</button></div>
</section>
<section id="result" class="card result hidden"><h2>完成這一輪 🎉</h2><div id="score" class="score"></div><p id="summary"></p>
<div class="actions" style="justify-content:center"><button id="retryWrong" class="btn secondary">重做錯題</button><button id="again" class="btn primary">再來一輪</button></div>
<div id="wrongList" class="wrong-list"></div></section>
</div>

": "我們的新鄰居很親切，也很好聊天。", "note": "形容人的性格", "category": "核心單字", "sentence": "Our new neighbor is ______ and easy to talk to.", "id": 6, "options": ["inferior", "despicable", "superior", "amiable"]}, {"answer": "anchorage", "pos": "n.", "definition": "錨地；停泊處", "example": "The bay provides a safe anchorage during storms.", "translation": "這個海灣在暴風雨期間提供安全的停泊處。", "note": "不可數或可數皆可", "category": "核心單字", "sentence": "The bay provides a safe ______ during storms.", "id": 7, "options": ["spur", "artifact", "porch", "anchorage"]}, {"answer": "approach", "pos": "n./v.", "definition": "方法；接近；著手處理", "example": "We need a different approach to solving this problem.", "translation": "我們需要用不同的方法解決這個問題。", "note": "名詞常搭：an approach to + N/V-ing", "category": "核心單字", "sentence": "We need a different ______ to solving this problem.", "id": 8, "options": ["commotion", "approach", "record", "convention"]}, {"answer": "assess", "pos": "v.", "definition": "評估；判定", "example": "The teacher assessed each student's progress at the end of the term.", "translation": "老師在學期末評估每位學生的進步情況。", "note": "名詞：assessment", "category": "核心單字", "sentence": "The teacher ______ed each student's progress at the end of the term.", "id": 9, "options": ["assess", "regain", "formulate", "reexamine"]}, {"answer": "assume", "pos": "v.", "definition": "假定；承擔；就任", "example": "Do not assume that everyone agrees with you.", "translation": "不要假設每個人都同意你。", "note": "也常見：assume responsibility/control/office", "category": "核心單字", "sentence": "Do not ______ that everyone agrees with you.", "id": 10, "options": ["undermine", "recite", "idolize", "assume"]}, {"answer": "attentive", "pos": "adj.", "definition": "專心的；留意的；體貼的", "example": "The staff were attentive to every guest's needs.", "translation": "工作人員細心留意每位客人的需求。", "note": "常用：be attentive to", "category": "核心單字", "sentence": "The staff were ______ to every guest's needs.", "id": 11, "options": ["tough", "resistant", "blazing", "attentive"]}, {"answer": "bandit", "pos": "n.", "definition": "強盜；土匪", "example": "The travelers were warned about bandits in the mountains.", "translation": "旅客被警告山區可能有強盜出沒。", "note": "可數名詞", "category": "核心單字", "sentence": "The travelers were warned about ______s in the mountains.", "id": 12, "options": ["amenities", "bandit", "extortion", "excursion"]}, {"answer": "blazing", "pos": "adj.", "definition": "熊熊燃燒的；炙熱的", "example": "We walked for hours under the blazing sun.", "translation": "我們在烈日下走了好幾個小時。", "note": "常見：blazing sun/fire", "category": "核心單字", "sentence": "We walked for hours under the ______ sun.", "id": 13, "options": ["secondary", "favorable", "blazing", "understaffed"]}, {"answer": "bulky", "pos": "adj.", "definition": "龐大笨重的", "example": "This winter coat is warm but rather bulky.", "translation": "這件冬季外套很暖，但相當厚重。", "note": "形容體積大、不便攜帶", "category": "核心單字", "sentence": "This winter coat is warm but rather ______.", "id": 14, "options": ["advisable", "cautious", "reminiscent", "bulky"]}, {"answer": "candid", "pos": "adj.", "definition": "坦率的；直言不諱的", "example": "To be candid, I do not think the plan is realistic.", "translation": "坦白說，我不認為這個計畫可行。", "note": "常用：To be candid,...", "category": "核心單字", "sentence": "To be ______, I do not think the plan is realistic.", "id": 15, "options": ["tolerant", "entitled", "candid", "vulnerable"]}, {"answer": "catalogue", "pos": "n./v.", "definition": "目錄；編目", "example": "The museum published a catalogue of its new exhibition.", "translation": "博物館出版了新展覽的目錄。", "note": "美式拼法：catalog", "category": "核心單字", "sentence": "The museum published a ______ of its new exhibition.", "id": 16, "options": ["intuition", "possession", "doubt", "catalogue"]}, {"answer": "cater", "pos": "v.", "definition": "提供餐飲；迎合；滿足需求", "example": "The hotel caters to business travelers.", "translation": "這間飯店主要服務商務旅客。", "note": "常用：cater to/for", "category": "核心單字", "sentence": "The hotel ______s to business travelers.", "id": 17, "options": ["idolize", "cater", "assess", "evoke"]}, {"answer": "cautious", "pos": "adj.", "definition": "謹慎的；小心的", "example": "Investors remain cautious about the unstable market.", "translation": "投資人對不穩定的市場仍保持謹慎。", "note": "名詞：caution", "category": "核心單字", "sentence": "Investors remain ______ about the unstable market.", "id": 18, "options": ["strained", "vulnerable", "cautious", "inferior"]}, {"answer": "chieftain", "pos": "n.", "definition": "酋長；部族首領", "example": "The chieftain spoke on behalf of the entire tribe.", "translation": "酋長代表整個部族發言。", "note": "較正式或歷史語境", "category": "核心單字", "sentence": "The ______ spoke on behalf of the entire tribe.", "id": 19, "options": ["detractors", "artifact", "chieftain", "anchorage"]}, {"answer": "coarse", "pos": "adj.", "definition": "粗糙的；粗俗的", "example": "The rope was coarse and scratched my hands.", "translation": "這條繩子很粗糙，磨傷了我的手。", "note": "可形容材質或言語", "category": "核心單字", "sentence": "The rope was ______ and scratched my hands.", "id": 20, "options": ["irrational", "colossal", "understaffed", "coarse"]}, {"answer": "colossal", "pos": "adj.", "definition": "巨大的；龐大的", "example": "The bridge was a colossal engineering achievement.", "translation": "這座橋是一項巨大的工程成就。", "note": "語氣比 enormous 更強", "category": "核心單字", "sentence": "The bridge was a ______ engineering achievement.", "id": 21, "options": ["exceptional", "colossal", "definite", "worth"]}, {"answer": "commotion", "pos": "n.", "definition": "騷動；混亂", "example": "A loud crash caused a commotion in the hallway.", "translation": "一聲巨響在走廊引起一陣騷動。", "note": "常用：cause a commotion", "category": "核心單字", "sentence": "A loud crash caused a ______ in the hallway.", "id": 22, "options": ["bandit", "illustration", "commotion", "concerns"]}, {"answer": "complete", "pos": "adj./v.", "definition": "完整的；徹底的；完成", "example": "The renovation was a complete success.", "translation": "這次整修完全成功。", "note": "不是「完美的」；完美通常是 perfect", "category": "核心單字", "sentence": "The renovation was a ______ success.", "id": 23, "options": ["reminiscent", "grotesque", "blazing", "complete"]}, {"answer": "condense", "pos": "v.", "definition": "凝結；濃縮；縮短", "example": "Water vapor condenses into droplets on the cold glass.", "translation": "水蒸氣在冰冷的玻璃上凝結成水滴。", "note": "名詞：condensation", "category": "核心單字", "sentence": "Water vapor ______s into droplets on the cold glass.", "id": 24, "options": ["condense", "undermine", "descend", "arising"]}, {"answer": "confederation", "pos": "n.", "definition": "聯盟；邦聯", "example": "Several small states formed a confederation for mutual defense.", "translation": "幾個小國組成邦聯以共同防禦。", "note": "較正式用字", "category": "核心單字", "sentence": "Several small states formed a ______ for mutual defense.", "id": 25, "options": ["confederation", "beggar", "slaughter", "resistance"]}, {"answer": "conformation", "pos": "n.", "definition": "構造；形態；符合", "example": "The protein's conformation changes when it binds to the molecule.", "translation": "蛋白質與該分子結合時，其構形會改變。", "note": "常見於生物、化學；勿與 confirmation 混淆", "category": "核心單字", "sentence": "The protein's ______ changes when it binds to the molecule.", "id": 26, "options": ["conformation", "compassion", "slip", "uptake"]}, {"answer": "constant", "pos": "adj./n.", "definition": "持續不斷的；恆定的；常數", "example": "The machine requires constant monitoring.", "translation": "這台機器需要持續監控。", "note": "名詞可指數學常數", "category": "核心單字", "sentence": "The machine requires ______ monitoring.", "id": 27, "options": ["constant", "staunch", "tough", "twisted"]}, {"answer": "constitution", "pos": "n.", "definition": "憲法；體質；組成", "example": "The constitution protects citizens' basic rights.", "translation": "憲法保障公民的基本權利。", "note": "依語境可指國家憲法或身體體質", "category": "核心單字", "sentence": "The ______ protects citizens' basic rights.", "id": 28, "options": ["constitution", "overbooking", "formula", "charisma"]}, {"answer": "coordinate", "pos": "v./adj./n.", "definition": "協調；同等的；座標", "example": "She coordinated the work of three different teams.", "translation": "她協調三個不同團隊的工作。", "note": "名詞座標多用複數 coordinates", "category": " : "地震後，救難人員在瓦礫堆中搜尋。"}, "deficient": {"pos": "adj.", "definition": "不足的；有缺陷的", "note": "常用：be deficient in", "example": "The diet is deficient in several essential vitamins.", "translation": "這種飲食缺乏數種必需維生素。"}, "deliberate": {"pos": "adj./v.", "definition": "深思熟慮的；故意的；仔細考慮", "note": "動詞重音常不同", "example": "The committee made a deliberate decision after reviewing the evidence.", "translation": "委員會審查證據後作出審慎決定。"}, "depressed": {"pos": "adj.", "definition": "沮喪的；蕭條的", "note": "也可形容經濟低迷", "example": "He felt depressed after receiving the disappointing news.", "translation": "收到令人失望的消息後，他感到很沮喪。"}, "descend": {"pos": "v.", "definition": "下降；下來；降臨", "note": "常用：descend on/upon", "example": "Darkness descended on the village.", "translation": "黑暗降臨在村莊。"}, "desperate": {"pos": "adj.", "definition": "絕望的；極度渴望的；迫切的", "note": "常用：be desperate for/to", "example": "The team is desperate for a victory.", "translation": "這支隊伍極度渴望一場勝利。"}, "despicable": {"pos": "adj.", "definition": "卑劣的；可鄙的", "note": "語氣強烈", "example": "Taking advantage of vulnerable people is despicable.", "translation": "利用弱勢者是卑劣的行為。"}, "dictator": {"pos": "n.", "definition": "獨裁者", "note": "可數名詞", "example": "The dictator banned all forms of political opposition.", "translation": "獨裁者禁止一切形式的政治反對活動。"}, "dignity": {"pos": "n.", "definition": "尊嚴；莊重", "note": "常用：with dignity", "example": "She faced the criticism with calmness and dignity.", "translation": "她平靜而有尊嚴地面對批評。"}, "disclose": {"pos": "v.", "definition": "揭露；公開", "note": "名詞：disclosure", "example": "The company refused to disclose the details of the agreement.", "translation": "公司拒絕公開協議細節。"}, "distribution": {"pos": "n.", "definition": "分配；分布；配送", "note": "動詞：distribute", "example": "The chart shows the distribution of income across the country.", "translation": "這張圖顯示全國收入的分布情況。"}, "endorsement": {"pos": "n.", "definition": "支持；背書；代言", "note": "也可指正式支持", "example": "The product gained popularity after a celebrity endorsement.", "translation": "這項產品在名人代言後廣受歡迎。" v.", "definition": "收穫；收割", "note": "名詞也可指收成", "example": "Farmers began to harvest the rice in early autumn.", "translation": "農民在初秋開始收割稻米。"}, "heighten": {"pos": "v.", "definition": "提高；加劇", "note": "常搭：heighten awareness/tension", "example": "The recent attacks have heightened public anxiety.", "translation": "近期的攻擊事件加劇了大眾焦慮。"}, "hinder": {"pos": "v.", "definition": "阻礙；妨礙", "note": "常用：hinder sb/sth from V-ing", "example": "Poor communication can hinder teamwork.", "translation": "溝通不良會妨礙團隊合作。"}, "hubbub": {"pos": "n.", "definition": "喧鬧；嘈雜聲", "note": "不可數名詞", "example": "I could barely hear her over the hubbub of the crowd.", "translation": "在人群的喧鬧聲中，我幾乎聽不見她說話。"}, "idolize": {"pos": "v.", "definition": "把……當偶像；崇拜", "note": "名詞：idol", "example": "Many young fans idolize the famous singer.", "translation": "許多年輕粉絲崇拜那位知名歌手。"}, "inferior": {"pos": "adj./n.", "definition": "較差的；次等的；下級", "note": "常用：be inferior to", "example": "This material is inferior to the one we used before.", "translation": "這種材料比我們先前使用的更差。"}, "inherit": {"pos": "v.", "definition": "繼承；遺傳", "note": "常用：inherit sth from sb", "example": "She inherited the house from her grandmother.", "translation": "她從祖母那裡繼承了這棟房子。"}, "instantly": {"pos": "adv.", "definition": "立即；立刻", "note": "同義：immediately", "example": "The audience recognized the song instantly.", "translation": "觀眾立刻認出了這首歌。"}, "intense": {"pos": "adj.", "definition": "強烈的；緊張的", "note": "名詞：intensity", "example": "The athletes trained under intense pressure.", "translation": "運動員在巨大壓力下訓練。"}, "invite": {"pos": "v.", "definition": "邀請；招致；引起", "note": "除「邀請」外也常指招致", "example": "Careless remarks may invite criticism.", "translation": "輕率的言論可能招致批評。"}, "irrational": {"pos": "adj.", "definition": "不理性的；不合理的", "note": "反義：rational", "example": "His fear of harmless insects is irrational.", "translation": "他對無害昆蟲的恐懼是不理性的。"}, "liberal": {"pos": "adj./n.", "definition": "開明的；自由派的；大量的", "note": "政治語境另有特定含義", "example": "The school takes a liberal approac he polished wood had a soft golden sheen.", "translation": "拋光後的木頭帶著柔和的金色光澤。"}, "shrewd": {"pos": "adj.", "definition": "精明的；敏銳的", "note": "通常帶正面或中性", "example": "She made a shrewd investment at the right time.", "translation": "她在適當時機做了一筆精明的投資。"}, "shrink back": {"pos": "phr. v.", "definition": "退縮；畏縮", "note": "過去式 shrank", "example": "The child shrank back when the dog barked.", "translation": "狗一叫，那個孩子便嚇得往後退。"}, "sizable": {"pos": "adj.", "definition": "相當大的；可觀的", "note": "英式也寫 sizeable", "example": "The company made a sizable profit last year.", "translation": "公司去年獲得可觀的利潤。"}, "slaughter": {"pos": "v./n.", "definition": "屠殺；大量宰殺", "note": "語氣強烈", "example": "Thousands of animals were slaughtered during the outbreak.", "translation": "疫情期間有數千隻動物被撲殺。"}, "slip": {"pos": "v./n.", "definition": "滑倒；滑落；疏失", "note": "多義字", "example": "Be careful not to slip on the wet floor.", "translation": "小心不要在濕滑的地板上滑倒。"}, "sorrow": {"pos": "n.", "definition": "悲傷；哀痛", "note": "較正式", "example": "She expressed deep sorrow over the loss.", "translation": "她對這次損失表示深切悲痛。"}, "spare": {"pos": "adj./v./n.", "definition": "備用的；空閒的；抽出；免除", "note": "「空的」不一定適用所有語境", "example": "Do you have a spare charger I can borrow?", "translation": "你有備用充電器可以借我嗎？"}, "spring up": {"pos": "phr. v.", "definition": "突然出現；迅速興起", "note": "過去分詞 sprung", "example": "New cafés have sprung up all over the neighborhood.", "translation": "附近突然開了許多新咖啡館。"}, "spur": {"pos": "n./v.", "definition": "刺激；激勵；促使", "note": "常用：spur sb to V", "example": "The criticism spurred him to work harder.", "translation": "這些批評促使他更加努力。"}, "standstill": {"pos": "n.", "definition": "停頓；停滯", "note": "固定搭配：come to a standstill", "example": "Traffic came to a standstill after the accident.", "translation": "事故發生後，交通完全停擺。"}, "strained": {"pos": "adj.", "definition": "緊張的；勉強的；拉傷的", "note": "也可指肌肉拉傷", "example": "Relations between the two countries remain strained.", "translation": "兩國關係仍然緊張。"}, "strain": {"pos": "n./v.", "definition": "壓力；拉傷；菌  "against all odds": {"pos": "idiom", "definition": "克服重重困難；儘管希望渺茫", "note": "可置於句首", "example": "Against all odds, the small team won the championship.", "translation": "儘管希望渺茫，這支小隊仍贏得冠軍。"}, "all the more": {"pos": "phrase", "definition": "更加；越發", "note": "常接形容詞或副詞", "example": "Her honesty made me respect her all the more.", "translation": "她的誠實讓我更加尊敬她。"}, "as for": {"pos": "phrase", "definition": "至於；談到", "note": "用來轉換話題", "example": "As for the budget, we will discuss it tomorrow.", "translation": "至於預算，我們明天再討論。"}, "assume control": {"pos": "phrase", "definition": "取得控制權；接管", "note": "assume + control of", "example": "The new manager assumed control of the department in May.", "translation": "新經理於五月接管該部門。"}, "assume office": {"pos": "phrase", "definition": "就職；上任", "note": "正式用語", "example": "The president will assume office next month.", "translation": "總統將於下個月就職。"}, "assume responsibility": {"pos": "phrase", "definition": "承擔責任", "note": "常搭 for", "example": "The company must assume responsibility for the accident.", "translation": "公司必須為這起事故承擔責任。"}, "at play": {"pos": "phrase", "definition": "在起作用；正在發揮影響", "note": "常用於分析原因", "example": "Several economic forces are at play in this market.", "translation": "這個市場中有數股經濟力量正在發揮作用。"}, "be committed to": {"pos": "phrase", "definition": "致力於；承諾投入", "note": "to 是介系詞，後接 N/V-ing", "example": "The school is committed to providing equal opportunities.", "translation": "學校致力於提供平等機會。"}, "be intended for": {"pos": "phrase", "definition": "供……使用；原本是給……的", "note": "常用被動", "example": "This guide is intended for first-time visitors.", "translation": "這份指南是為初次造訪者編寫的。"}, "be littered with": {"pos": "phrase", "definition": "散布著；充斥著", "note": "可指具體物或比喻錯誤", "example": "The path was littered with fallen branches.", "translation": "小徑上散落著掉落的樹枝。"}, "be worlds apart": {"pos": "idiom", "definition": "截然不同；天壤之別", "note": "主詞通常為複數", "example": "Their teaching styles are worlds apart.", "translation": "他們的教學風格截然不同。"}, "blend with": {"pos": "phrase", "definition": "與……融合；混合", "note": "也可用 blend into", "example": "The building blends with the surrounding landscape.", "translation": "這棟建築與周圍景觀融為一體。"}, "by no means": {"pos": "idiom", "definition": "絕不；一點也不", "note": "置於句首時可能倒裝", "example": "The task is by no means easy.", "translation": "這項任務絕不容易。"}, "call into question": {"pos": "phrase", "definition": "使人懷疑；質疑", "note": "常用：call sth into question", "example": "The new evidence calls his story into question.", "translation": "新證據使人開始懷疑他的說法。"}, "call up": {"pos": "phr. v.", "definition": "打電話；喚起（記憶）", "note": "多義片語", "example": "The old song called up memories of my childhood.", "translation": "那首老歌喚起了我的童年回憶。"}, "cast doubt on": {"pos": "phrase", "definition": "使人懷疑；對……投下疑問", "note": "主詞常為 evidence/report", "example": "The report casts doubt on the accuracy of the data.", "translation": "這份報告使人懷疑數據的準確性。"}, "chew over": {"pos": "phr. v.", "definition": "反覆思考；仔細考慮", "note": "較口語", "example": "Let me chew over your proposal before I decide.", "translation": "讓我仔細想想你的提案再決定。"}, "come to a standstill": {"pos": "phrase", "definition": "陷入停頓；完全停止", "note": "固定搭配", "example": "Production came to a standstill during the power outage.", "translation": "停電期間，生產完全停擺。"}, "descend upon": {"pos": "phr. v.", "definition": "突然大批到來；降臨", "note": "語氣常帶突然與大量", "example": "Thousands of tourists descended upon the town.", "translation": "數千名遊客突然湧入這座小鎮。"}, "do a favor for": {"pos": "phrase", "definition": "幫……一個忙", "note": "更常說 do sb a favor", "example": "Could you do a favor for me and check this file?", "translation": "你可以幫我一個忙，檢查這個檔案嗎？"}, "doom to": {"pos": "phrase", "definition": "使某人注定遭受……", "note": "常用：doom sth to failure", "example": "Poor planning doomed the project to failure.", "translation": "規劃不周使這項計畫注定失敗。"}, "dwell on": {"pos": "phr. v.", "definition": "老是想著；詳述", "note": "後接名詞", "example": "There is no point in dwelling on past mistakes.", "translation": "一直糾結過去的錯誤沒有意義。"}, "economic recession": {"pos": "noun phrase", " ", "definition": "更不用說；遑論", "note": "前後語意由較容易到更不可能", "example": "He cannot afford a bicycle, let alone a car.", "translation": "他連腳踏車都買不起，更別說汽車了。"}, "look over": {"pos": "phr. v.", "definition": "查看；檢查", "note": "較口語", "example": "Please look over the report before the meeting.", "translation": "請在會議前查看這份報告。"}, "maple syrup": {"pos": "noun phrase", "definition": "楓糖漿", "note": "不可數名詞", "example": "She poured maple syrup over the pancakes.", "translation": "她把楓糖漿淋在鬆餅上。"}, "not cricket": {"pos": "idiom", "definition": "不公平；不光明正大", "note": "英式非正式用語", "example": "Changing the rules halfway through is simply not cricket.", "translation": "比賽中途改規則實在不公平。"}, "on end": {"pos": "phrase", "definition": "連續地；直立地", "note": "常接一段時間", "example": "It rained for three days on end.", "translation": "雨連續下了三天。"}, "ponder on": {"pos": "phr. v.", "definition": "仔細思考；沉思", "note": "更常直接用 ponder sth", "example": "She pondered on the question for several minutes.", "translation": "她沉思那個問題好幾分鐘。"}, "survive the exposure": {"pos": "phrase", "definition": "在暴露於某環境後存活", "note": "更自然搭配：survive exposure to", "example": "Few plants can survive prolonged exposure to salt water.", "translation": "很少植物能在長期接觸鹽水後存活。"}, "take turns": {"pos": "phrase", "definition": "輪流", "note": "常用：take turns V-ing", "example": "The students took turns reading aloud.", "translation": "學生們輪流大聲朗讀。"}, "turn down": {"pos": "phr. v.", "definition": "拒絕；調低", "note": "多義片語", "example": "She turned down the job offer.", "translation": "她拒絕了那份工作邀請。"}, "turnover": {"pos": "n.", "definition": "營業額；人員流動率；翻轉", "note": "商務語境常指營業額或離職率", "example": "The company has a high staff turnover rate.", "translation": "這家公司的人員流動率很高。"}, "wipe out": {"pos": "phr. v.", "definition": "徹底消滅；摧毀", "note": "語氣強烈", "example": "The disease nearly wiped out the entire population.", "translation": "這種疾病幾乎消滅了整個族群。"}, "wrestle with": {"pos": "phr. v.", "definition": "努力處理；與……搏鬥", "note": "可指抽象問題", "example": "Many students wrestle with this difficult concept.  on TV.", "translation": ""}, "asunder": {"pos": "", "definition": "被拆散、四分五裂", "note": "be torn asunder＝被拆散、四分五裂", "example": "Due to the war, many families in that country were torn asunder, and people suffered from hunger and misfortune.", "translation": ""}, "twisted": {"pos": "adj./p.p.", "definition": "扭曲的；彎曲的", "note": "a twisted face＝扭曲的臉", "example": "", "translation": "病人的臉因嚴重肌肉痙攣而顯得扭曲。"}, "oversize": {"pos": "adj.", "definition": "過大的；超大尺寸的", "note": "oversize clothes＝寬大的衣服", "example": "", "translation": "他穿著一件寬大的襯衫，鬆鬆地垂在瘦弱的身軀上。"}, "drooping": {"pos": "adj./V-ing", "definition": "下垂的；低垂的", "note": "drooping eyes/leaves", "example": "The plant had drooping leaves.", "translation": "這株植物的葉子低垂。"}, "suffer from": {"pos": "phrase", "definition": "患有；遭受……", "note": "suffer from + N", "example": "She suffers from a rare disease.", "translation": "她患有罕見疾病。"}, "syndrome": {"pos": "n.", "definition": "症候群", "note": "suffer from a syndrome", "example": "The child was diagnosed with a rare syndrome.", "translation": "那名孩子被診斷出罕見症候群。"}, "worldwide": {"pos": "adj./adv.", "definition": "全球的；在全世界", "note": "cases worldwide＝全球病例", "example": "", "translation": "全世界僅通報少數病例。"}, "consume": {"pos": "v.", "definition": "攝取；消耗", "note": "consume food/energy", "example": "The patient consumes formula through a tube.", "translation": "病人透過管子攝取配方食品。"}, "formula": {"pos": "n.", "definition": "配方；配方食品；公式", "note": "infant formula", "example": "The baby was fed infant formula.", "translation": "嬰兒被餵食配方奶。"}, "via": {"pos": "prep.", "definition": "經由；透過", "note": "via a tube＝透過管子", "example": "", "translation": "藥物透過餵食管輸送。"}, "tube": {"pos": "n.", "definition": "管子；導管", "note": "feeding tube＝餵食管", "example": "", "translation": "營養物直接透過餵食管輸送。"}, "feedbag": {"pos": "n.", "definition": "餵食袋", "note": "formula from a feedbag", "example": "", "translation": "營養配方從餵食袋流入導管。"}, "pump": {"pos": "n./v.", "definition": "幫浦；抽送", "note": "powered by a pump", "example": "", "translation": "流質食物由一個小型電 ": "phrase", "definition": "彷彿／好像……", "note": "as though + S + V", "example": "She turned away as though she would leave.", "translation": "她轉過身，彷彿要離開。"}, "expect": {"pos": "phrase", "definition": "期待 B 具備／做到 A", "note": "expect A of B", "example": "Much is expected of young people.", "translation": "社會對年輕人抱有很高期待。"}, "neither A nor B": {"pos": "phrase", "definition": "既不 A 也不 B", "note": "neither A nor B", "example": "He can neither speak nor walk.", "translation": "他既不能說話，也不能走路。"}, "powered by": {"pos": "phrase", "definition": "由……驅動／供能", "note": "powered by + N", "example": "The device is powered by batteries.", "translation": "這個裝置由電池供電。"}, "despite/V-ing": {"pos": "phrase", "definition": "儘管……", "note": "despite + N/V-ing", "example": "Despite the rain, we went out.", "translation": "儘管下雨，我們仍外出。"}, "bond with": {"pos": "phrase", "definition": "與……建立感情", "note": "bond with + 人", "example": "The parents bonded with the child.", "translation": "父母與孩子建立了深厚感情。"}, "wear off": {"pos": "phrase", "definition": "逐漸消退；逐漸失效", "note": "wear off", "example": "The effect of the medicine wore off.", "translation": "藥效逐漸消退。"}, "get across": {"pos": "phrase", "definition": "傳達清楚；使人理解", "note": "get across", "example": "I could not get my point across.", "translation": "我無法把觀點講清楚。"}, "stack up": {"pos": "phrase", "definition": "堆積；比較起來", "note": "stack up", "example": "How does this product stack up against its rivals?", "translation": "這項產品和競爭者相比如何？"}, "turn": {"pos": "phrase", "definition": "把 A 變成 B", "note": "turn A into B", "example": "The experience turned him into a stronger person.", "translation": "這次經歷使他變得更堅強。"}, "here and now": {"pos": "phrase", "definition": "此時此刻", "note": "here and now", "example": "Try to live in the here and now.", "translation": "試著活在當下。"}, "play a crucial part in": {"pos": "phrase", "definition": "在……扮演關鍵角色", "note": "play a crucial part in", "example": "Trust plays a crucial part in cooperation.", "translation": "信任在合作中扮演關鍵角色。"}, "serve as": {"pos": "phrase", "definition": "作為；充當……", "note": "serve as + N", "example": "The room serves as a library.", "translation": "這個房間作為圖書館使用。"}, "in total": {"pos": "phrase", "definition": "總共；合計", "note": "in total", "example": "There are fifty students in total.", "translation": "總共有五十名學生。"}, "at heart": {"pos": "phrase", "definition": "本質上；內心深處", "note": "at heart", "example": "He is kind at heart.", "translation": "他本質上很善良。"}, "on the whole": {"pos": "phrase", "definition": "整體而言", "note": "on the whole", "example": "On the whole, the event was successful.", "translation": "整體而言，活動很成功。"}, "by all means": {"pos": "phrase", "definition": "當然可以；務必", "note": "by all means", "example": "By all means, come in.", "translation": "當然可以，請進。"}, "seek": {"pos": "phrase", "definition": "尋找／尋求……", "note": "seek + N", "example": "They sought shelter from the rain.", "translation": "他們尋找躲雨處。"}, "bundle oneself up": {"pos": "phrase", "definition": "把自己裹暖；穿暖", "note": "bundle oneself up", "example": "Bundle yourself up before going outside.", "translation": "出門前穿暖一點。"}, "be replaced by": {"pos": "phrase", "definition": "被……取代", "note": "be replaced by + N", "example": "Old machines were replaced by new ones.", "translation": "舊機器被新機器取代。"}, "low-cost carrier": {"pos": "phrase", "definition": "低成本航空公司", "note": "low-cost carrier", "example": "The low-cost carrier offers cheap flights.", "translation": "這家低成本航空提供便宜航班。"}, "seek to": {"pos": "phrase", "definition": "力求；試圖做……", "note": "seek to + V", "example": "The company seeks to reduce costs.", "translation": "公司力求降低成本。"}, "undercut A by X%": {"pos": "phrase", "definition": "比 A 低 X%；削價競爭", "note": "undercut A by X%", "example": "The airline undercut its rivals by 20%.", "translation": "這家航空公司的價格比競爭對手低兩成。"}, "first-come, first-served": {"pos": "phrase", "definition": "先到先得", "note": "first-come, first-served", "example": "Seats are available on a first-come, first-served basis.", "translation": "座位採先到先得制。"}, "operate out of": {"pos": "phrase", "definition": "以某地為營運基地", "note": "operate out of + 地點", "example": "The airline operates out of a secondary airport.", "translation": "這家航空以次要機場為營運基地。"}, "non-peak times": {"pos": "phrase", "definition": "離峰時段", "note": "non-peak times", "example": "Flights are cheaper at non-peak times.", "translation": "離峰時段的航班較便宜。"}, "hardly any": {"pos": "phrase", "definition": "幾乎沒有任何……", "note": "hardly any + N", "example": "There are hardly any seats left.", "translation": "幾乎沒有座位了。"}, "be on the rise": {"pos": "phrase", "definition": "正在上升／增加", "note": "be on the rise", "example": "The popularity of budget airlines is on the rise.", "translation": "廉航受歡迎程度正在上升。"}, "fill a need": {"pos": "phrase", "definition": "滿足需求", "note": "fill a need", "example": "The service fills a need in rural areas.", "translation": "這項服務滿足偏鄉需求。"}, "opt to": {"pos": "phrase", "definition": "選擇做……", "note": "opt to + V", "example": "They opted to travel by train.", "translation": "他們選擇搭火車旅行。"}, "opt for": {"pos": "phrase", "definition": "選擇……", "note": "opt for + N", "example": "She opted for the cheaper plan.", "translation": "她選擇較便宜的方案。"}, "be dedicated to/V-ing": {"pos": "phrase", "definition": "專用於；致力於……", "note": "be dedicated to + N/V-ing", "example": "The terminal is dedicated to low-cost airlines.", "translation": "這座航廈專供廉航使用。"}, "not without": {"pos": "phrase", "definition": "並非沒有……", "note": "not without + N", "example": "The plan is not without risks.", "translation": "這項計畫並非沒有風險。"}, "complain of": {"pos": "phrase", "definition": "抱怨／訴說某種不適", "note": "complain of + 症狀", "example": "The patient complained of chest pain.", "translation": "病人訴說胸痛。"}, "arise from": {"pos": "phrase", "definition": "起因於……", "note": "arise from + 原因", "example": "The problem arose from poor communication.", "translation": "問題源自溝通不良。"}, "file a lawsuit": {"pos": "phrase", "definition": "提起訴訟", "note": "file a lawsuit", "example": "The passenger filed a lawsuit against the airline.", "translation": "乘客對航空公司提起訴訟。"}, "be regarded as/adj.": {"pos": "phrase", "definition": "被視為……", "note": "be regarded as + N/adj.", "example": "Tomatoes were once regarded as dangerous.", "translation": "番茄過去曾被視為危險食物。"}, "take for granted": {"pos": "phrase", "definition": "視為理所當然", "note": "take for granted", "example": "We often take clean water for granted.", "translation": "我們常把乾淨的水視為理所當然。"}, "turn out to be./N": {"pos": "phrase", "definition": "結果證明是……", "note": "turn out to be + adj./N", "example": "The fruit turned out to be safe.", "translation": "這種水果結果證明是安全的。"}, "give rise to": {"pos": "phrase", "definition": "引起；造成……", "note": "give rise to + N", "example": "The rumor gave rise to fear.", "translation": "謠言引起恐慌。"}, "be reluctant to": {"pos": "phrase", "definition": "不願意做……", "note": "be reluctant to + V", "example": "People were reluctant to eat the tomato.", "translation": "人們不願意吃番茄。"}, "in any event": {"pos": "phrase", "definition": "無論如何；不管怎樣", "note": "in any event", "example": "In any event, we must finish the work.", "translation": "無論如何，我們必須完成工作。"}};
let queue=[],index=0,correct=0,streak=0,answered=false,wrong=[];
const WRONGBOOK_KEY="vocabQuizWrongBookV1";
function loadWrongBook(){
  try{return JSON.parse(localStorage.getItem(WRONGBOOK_KEY)||"[]")}catch(e){return[]}
}
function saveWrongBook(items){
  localStorage.setItem(WRONGBOOK_KEY,JSON.stringify(items));
  updateWrongBookUI();
}
function wrongKey(q){
  return String(q.id||"")+"||"+String(q.sentence||"")+"||"+String(q.answer||"");
}
function addToWrongBook(q,chosen){
  const book=loadWrongBook();
  const key=wrongKey(q);
  const existing=book.find(x=>wrongKey(x)===key);
  const entry={...q,chosen:chosen||"",wrongCount:(existing?.wrongCount||0)+1,lastWrongAt:new Date().toISOString()};
  const next=book.filter(x=>wrongKey(x)!==key);
  next.unshift(entry);
  saveWrongBook(next);
}
function removeFromWrongBook(key){
  saveWrongBook(loadWrongBook().filter(x=>wrongKey(x)!==key));
}
function clearWrongBook(){
  if(confirm("確定要清空所有錯題嗎？")) saveWrongBook([]);
}
function updateWrongBookUI(){
  const book=loadWrongBook();
  $("#wrongBookCount").textContent=`${book.length} 題`;
  $("#practiceWrongBook").disabled=book.length===0;
  $("#viewWrongBook").disabled=book.length===0;
  const list=$("#wrongBookList");
  if(!list.classList.contains("hidden")) renderWrongBookList();
}
function renderWrongBookList(){
  const book=loadWrongBook();
  const list=$("#wrongBookList");
  list.innerHTML=book.length?book.map(q=>{
    const chosenInfo=INFO[q.chosen]||{};
    const answerInfo=INFO[q.answer]||{};
    return `<div class="wrongbook-card">
      <div class="wb-sentence">${esc(q.sentence)}</div>
      <div class="wb-row"><b>你上次選：</b>${esc(q.chosen||"（跳過）")} ${chosenInfo.definition?`— ${esc(chosenInfo.definition)}`:""}</div>
      <div class="wb-row"><b>正確答案：</b>${esc(q.answer)} ${answerInfo.definition?`— ${esc(answerInfo.definition)}`:""}</div>
      ${answerInfo.note?`<div class="wb-row"><b>搭配／用法：</b>${esc(answerInfo.note)}</div>`:""}
      <div class="wb-row"><b>答錯次數：</b>${q.wrongCount||1}</div>
      <div class="wb-actions">
        <button class="btn secondary wb-practice-one" data-key="${esc(wrongKey(q))}">重做這題</button>
        <button class="btn danger wb-remove" data-key="${esc(wrongKey(q))}">刪除</button>
      </div>
    </div>`;
  }).join(""):`<div class="small">目前沒有錯題 🎉</div>`;
  list.querySelectorAll(".wb-remove").forEach(b=>b.onclick=()=>removeFromWrongBook(b.dataset.key));
  list.querySelectorAll(".wb-practice-one").forEach(b=>b.onclick=()=>{
    const q=loadWrongBook().find(x=>wrongKey(x)===b.dataset.key);
    if(q) startRound([q]);
  });
}


const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function infoHtml(word){
 const x=INFO[word]||{};
 return `<span class="label">${esc(word)}</span>${x.pos?`（${esc(x.pos)}）`:""}：${esc(x.definition||"無補充中文義")}`
   +(x.note?`<br>常見搭配／用法：${esc(x.note)}`:"")
   +(x.example?`<br>例句：${esc(x.example)}`:"");
}
function startRound(custom){
 const n=Math.min(Number($("#count").value),BANK.length);
 queue=custom?shuffle(custom):shuffle(BANK).slice(0,n);
 index=0;correct=0;streak=0;answered=false;wrong=[];
 $("#result").classList.add("hidden");$("#quiz").classList.remove("hidden");render();
}
function render(){
 answered=false;const q=queue[index];
 $("#qmeta").textContent=`第 ${index+1} 題／共 ${queue.length} 題`;
 $("#sentence").innerHTML=esc(q.sentence).replace("______","<u>______</u>");
 $("#options").innerHTML="";
 q.options.forEach((opt,i)=>{const b=document.createElement("button");b.className="option";b.innerHTML=`<b>${String.fromCharCode(65+i)}.</b> ${esc(opt)}`;b.onclick=()=>choose(opt,b);$("#options").appendChild(b)});
 $("#feedback").className="feedback";$("#feedback").innerHTML="";$("#next").classList.add("hidden");updateStats();
}
function choose(opt,btn){
 if(answered)return;answered=true;const q=queue[index],ok=opt===q.answer;
 $$(".option").forEach(b=>{const t=b.textContent.replace(/^[A-D]\.\s*/,"").trim();if(t===q.answer)b.classList.add("correct");else if(b===btn&&!ok)b.classList.add("wrong");else b.classList.add("dim");b.disabled=true});
 if(ok){correct++;streak++; if(queue.length===1 || queue.every(x=>loadWrongBook().some(w=>wrongKey(w)===wrongKey(x)))) removeFromWrongBook(wrongKey(q));}else{streak=0;wrong.push({...q,chosen:opt});addToWrongBook(q,opt)}
 const fb=$("#feedback");fb.className="feedback show "+(ok?"good":"bad");
 if(ok){
   fb.innerHTML=`<b>✅ 正確！</b><div class="small">${infoHtml(q.answer)}${q.translation?`<br>句子翻譯：${esc(q.translation)}`:""}</div>`;
 }else{
   fb.innerHTML=`<b>❌ 你選了：${esc(opt)}</b>
   <div class="wrong-explain"><b>錯誤選項解釋</b><br>${infoHtml(opt)}<br><span class="small">它的意思或搭配不符合本句。</span></div>
   <div class="wrong-explain"><b>正確答案</b><br>${infoHtml(q.answer)}${q.translation?`<br>句子翻譯：${esc(q.translation)}`:""}</div>`;
 }
 $("#next").textContent=index===queue.length-1?"看結果":"下一題";$("#next").classList.remove("hidden");updateStats();
}
function updateStats(){const done=index+(answered?1:0);$("#progressText").textContent=`${done}/${queue.length}`;$("#correctText").textContent=correct;$("#streakText").textContent=streak;$("#rateText").textContent=done?Math.round(correct/done*100)+"%":"0%";$("#bar").style.width=(done/queue.length*100)+"%"}
function nextQ(){if(index<queue.length-1){index++;render()}else finish()}
function finish(){$("#quiz").classList.add("hidden");$("#result").classList.remove("hidden");$("#score").textContent=`${correct} / ${queue.length}`;$("#summary").textContent=`正確率 ${Math.round(correct/queue.length*100)}%，錯題 ${wrong.length} 題。`;$("#retryWrong").classList.toggle("hidden",!wrong.length);
$("#wrongList").innerHTML=wrong.length?"<h3>錯題整理</h3>"+wrong.map(q=>`<div class="wrong-item"><b>題目：</b>${esc(q.sentence)}<br><b>你選：</b>${esc(q.chosen)} — ${esc((INFO[q.chosen]||{}).definition||"")}<br><b>答案：</b>${esc(q.answer)} — ${esc((INFO[q.answer]||{}).definition||"")}</div>`).join(""):"<p>全對，太猛了 🔥</p>"}
$("#next").onclick=nextQ;$("#skip").onclick=()=>{if(!answered){wrong.push({...queue[index],chosen:"（跳過）"});addToWrongBook(queue[index],"（跳過）")}nextQ()};$("#newRound").onclick=()=>startRound();$("#again").onclick=()=>startRound();$("#retryWrong").onclick=()=>startRound(wrong);
$("#practiceWrongBook").onclick=()=>{
  const book=loadWrongBook();
  if(book.length) startRound(book);
};
$("#viewWrongBook").onclick=()=>{
  $("#wrongBookList").classList.toggle("hidden");
  if(!$("#wrongBookList").classList.contains("hidden")) renderWrongBookList();
};
$("#clearWrongBook").onclick=clearWrongBook;
updateWrongBookUI();
startRound();
</script></body></html>
