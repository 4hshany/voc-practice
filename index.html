<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>英文單字填空互動測驗</title>
<style>
:root {
  --bg:#f4efe7; --card:#fffdf9; --ink:#252422; --muted:#706b63;
  --accent:#2f6f62; --good:#23754e; --bad:#b84747; --line:#ddd5c9;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink)}
.app{max-width:800px;margin:auto;padding:14px 14px 36px}
header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
h1{font-size:clamp(21px,5vw,31px);margin:0}
.badge{background:#222;color:#fff;padding:7px 10px;border-radius:999px;font-size:12px;white-space:nowrap}
.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 12px 28px rgba(60,45,25,.09)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.stat{background:#f0ebe3;border-radius:13px;padding:9px;text-align:center;font-size:12px}
.stat b{display:block;font-size:19px;margin-top:2px}
.progress{height:9px;background:#e7e0d5;border-radius:99px;overflow:hidden;margin:13px 0 18px}
.progress div{height:100%;width:0;background:var(--accent);transition:.2s}
.qmeta{font-size:13px;color:var(--muted);font-weight:700}
.sentence{font-family:Georgia,"Times New Roman",serif;font-size:clamp(21px,4.5vw,29px);line-height:1.5;margin:12px 0 18px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:11px}
button{font:inherit;cursor:pointer}
.option{border:2px solid var(--line);background:white;border-radius:15px;padding:14px;text-align:left;font-size:16px;font-weight:750;min-height:58px}
.option.correct{border-color:var(--good);background:#eaf7ef;color:#155b3a}
.option.wrong{border-color:var(--bad);background:#fff0f0;color:#8e3030}
.option.dim{opacity:.5}
.feedback{display:none;margin-top:15px;border-radius:15px;padding:14px;line-height:1.55}
.feedback.show{display:block}
.feedback.good{background:#eaf7ef;color:#155b3a}
.feedback.bad{background:#fff0f0;color:#842f2f}
.note{font-size:14px;margin-top:6px;color:#504b45}
.actions{display:flex;justify-content:space-between;gap:10px;margin-top:15px}
.action{border:0;border-radius:14px;padding:12px 16px;font-weight:800}
.primary{background:var(--accent);color:white}
.secondary{background:#e9e3d9;color:var(--ink)}
.hidden{display:none!important}
.result{text-align:center}
.result .score{font-size:56px;font-weight:900;color:var(--accent);margin:10px 0}
.wrong-list{text-align:left;margin-top:18px}
.wrong-item{padding:11px 0;border-bottom:1px solid var(--line)}
.settings{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-bottom:10px}
select{border:1px solid var(--line);border-radius:12px;padding:9px;background:#fff}
@media(max-width:600px){
 .options{grid-template-columns:1fr}
 .stats{grid-template-columns:repeat(2,1fr)}
 .card{padding:14px}
}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>📚 英文單字填空測驗</h1>
  <span class="badge">227 題混合題庫</span>
</header>

<div class="settings">
  <label>本輪題數
    <select id="count">
      <option value="10">10</option>
      <option value="20">20</option>
      <option value="30">30</option>
      <option value="50">50</option>
      <option value="227" selected>227</option>
    </select>
  </label>
  <button id="newRound" class="action secondary">重新抽題</button>
</div>

<section id="quiz" class="card">
  <div class="stats">
    <div class="stat">進度<b id="progressText">0/0</b></div>
    <div class="stat">答對<b id="correctText">0</b></div>
    <div class="stat">連勝<b id="streakText">0</b></div>
    <div class="stat">正確率<b id="rateText">0%</b></div>
  </div>
  <div class="progress"><div id="bar"></div></div>
  <div class="qmeta" id="qmeta"></div>
  <div class="sentence" id="sentence"></div>
  <div class="options" id="options"></div>
  <div id="feedback" class="feedback"></div>
  <div class="actions">
    <button id="skip" class="action secondary">跳過</button>
    <button id="next" class="action primary hidden">下一題</button>
  </div>
</section>

<section id="result" class="card result hidden">
  <h2>完成這一輪 🎉</h2>
  <div id="score" class="score"></div>
  <p id="summary"></p>
  <div class="actions" style="justify-content:center">
    <button id="retryWrong" class="action secondary">重做錯題</button>
    <button id="again" class="action primary">再來一輪</button>
  </div>
  <div id="wrongList" class="wrong-list"></div>
</section>
</div>

  return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function startRound(customQueue){
  const n=Math.min(Number($("#count").value), BANK.length);
  queue=customQueue ? shuffle(customQueue) : shuffle(BANK).slice(0,n);
  index=0; correct=0; streak=0; answered=false; wrong=[];
  $("#result").classList.add("hidden");
  $("#quiz").classList.remove("hidden");
  render();
}
function render(){
  answered=false;
  const q=queue[index];
  $("#qmeta").textContent=`第 ${index+1} 題／共 ${queue.length} 題`;
  $("#sentence").innerHTML=esc(q.sentence).replace("______","<u>______</u>");
  $("#options").innerHTML="";
  q.options.forEach((opt,i)=>{
    const b=document.createElement("button");
    b.className="option";
    b.innerHTML=`<b>${String.fromCharCode(65+i)}.</b> ${esc(opt)}`;
    b.addEventListener("click",()=>choose(opt,b));
    $("#options").appendChild(b);
  });
  $("#feedback").className="feedback";
  $("#feedback").innerHTML="";
  $("#next").classList.add("hidden");
  updateStats();
}
function choose(opt,btn){
  if(answered)return;
  answered=true;
  const q=queue[index];
  const ok=opt===q.answer;
  $$(".option").forEach(b=>{
    const txt=b.textContent.replace(/^[A-D]\.\s*/,"").trim();
    if(txt===q.answer)b.classList.add("correct");
    else if(b===btn&&!ok)b.classList.add("wrong");
    else b.classList.add("dim");
    b.disabled=true;
  });
  if(ok){correct++;streak++;}
  else{streak=0;wrong.push(q);}
  const fb=$("#feedback");
  fb.className="feedback show "+(ok?"good":"bad");
  fb.innerHTML=(ok?"<b>✅ 正確！</b>":`<b>❌ 正確答案：${esc(q.answer)}</b>`)
    +`<div class="note">${esc(q.definition||"")}<br>${esc(q.note||"")}`
    +(q.translation?`<br>例句翻譯：${esc(q.translation)}`:"")+"</div>";
  $("#next").textContent=index===queue.length-1?"看結果":"下一題";
  $("#next").classList.remove("hidden");
  updateStats();
}
function updateStats(){
  const done=index+(answered?1:0);
  $("#progressText").textContent=`${done}/${queue.length}`;
  $("#correctText").textContent=correct;
  $("#streakText").textContent=streak;
  $("#rateText").textContent=done?Math.round(correct/done*100)+"%":"0%";
  $("#bar").style.width=(queue.length?done/queue.length*100:0)+"%";
}
function nextQuestion(){
  if(index<queue.length-1){index++;render();} else finish();
}
function finish(){
  $("#quiz").classList.add("hidden");
  $("#result").classList.remove("hidden");
  $("#score").textContent=`${correct} / ${queue.length}`;
  $("#summary").textContent=`正確率 ${Math.round(correct/queue.length*100)}%，錯題 ${wrong.length} 題。`;
  $("#retryWrong").classList.toggle("hidden",wrong.length===0);
  $("#wrongList").innerHTML=wrong.length
    ?"<h3>錯題整理</h3>"+wrong.map(q=>`<div class="wrong-item"><b>${esc(q.answer)}</b>：${esc(q.definition||"")}<br><small>${esc(q.note||"")}</small></div>`).join("")
    :"<p>全對，太猛了 🔥</p>";
}

$("#next").addEventListener("click",nextQuestion);
$("#skip").addEventListener("click",()=>{if(!answered)wrong.push(queue[index]);nextQuestion();});
$("#newRound").addEventListener("click",()=>startRound());
$("#again").addEventListener("click",()=>startRound());
$("#retryWrong").addEventListener("click",()=>startRound(wrong));

startRound();
</script>
</body>
</html>
