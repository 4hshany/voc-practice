<style>
:root{--bg:#f4efe7;--paper:#fffdf9;--ink:#252422;--muted:#6e685f;--line:#ddd5c9;--accent:#2f6f62;--good:#1e744b;--bad:#aa4040}

.app{max-width:820px;margin:auto;padding:14px 14px 40px}

.settings{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}

.card{background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 12px 28px rgba(60,45,25,.08)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px} .stat{background:#f0ebe3;border-radius:13px;padding:9px;text-align:center;font-size:12px} .stat b{display:block;font-size:19px}

 .label{font-weight:900} .small{font-size:14px;color:#504b45}

<header><h1>📚 英文單字填空測驗</h1><span class="badge">575 題混合題庫</span></header>
<div class="settings">

  <div id="wrongBookList" class="wrongbook-list hidden"></div>

<section id="quiz" class="card">
<div class="stats"><div class="stat">進度<b id="progressText">0/0</b></div><div class="stat">答對<b id="correctText">0</b></div><div class="stat">連勝<b id="streakText">0</b></div><div class="stat">正確率<b id="rateText">0%</b></div></div>

<section id="result" class="card result hidden"><h2>完成這一輪 🎉</h2><div id="score" class="score"></div><p id="summary"></p>
<div class="actions" style="justify-content:center"><button id="retryWrong" class="btn secondary">重做錯題</button><button id="again" class="btn primary">再來一輪</button></div>
<div id="wrongList" class="wrong-list"></div></section>

v.", "definition": "收穫；收割", "note": "名詞也可指收成", "example": "Farmers began to harvest the rice in early autumn.", "translation": "農民在初秋開始收割稻米。"}, "heighten": {"pos": "v.", "definition": "提高；加劇", "note": "常搭：heighten awareness/tension", "example": "The recent attacks have heightened public anxiety.", "translation": "近期的攻擊事件加劇了大眾焦慮。"}, "hinder": {"pos": "v.", "definition": "阻礙；妨礙", "note": "常用：hinder sb/sth from V-ing", "example": "Poor communication can hinder teamwork.", "translation": "溝通不良會妨礙團隊合作。"}, "hubbub": {"pos": "n.", "definition": "喧鬧；嘈雜聲", "note": "不可數名詞", "example": "I could barely hear her over the hubbub of the crowd.", "translation": "在人群的喧鬧聲中，我幾乎聽不見她說話。"}, "idolize": {"pos": "v.", "definition": "把……當偶像；崇拜", "note": "名詞：idol", "example": "Many young fans idolize the famous singer.", "translation": "許多年輕粉絲崇拜那位知名歌手。"}, "inferior": {"pos": "adj./n.", "definition": "較差的；次等的；下級", "note": "常用：be inferior to", "example": "This material is inferior to the one we used before.", "translation": "這種材料比我們先前使用的更差。"}, "inherit": {"pos": "v.", "definition": "繼承；遺傳", "note": "常用：inherit sth from sb", "example": "She inherited the house from her grandmother.", "translation": "她從祖母那裡繼承了這棟房子。"}, "instantly": {"pos": "adv.", "definition": "立即；立刻", "note": "同義：immediately", "example": "The audience recognized the song instantly.", "translation": "觀眾立刻認出了這首歌。"}, "intense": {"pos": "adj.", "definition": "強烈的；緊張的", "note": "名詞：intensity", "example": "The athletes trained under intense pressure.", "translation": "運動員在巨大壓力下訓練。"}, "invite": {"pos": "v.", "definition": "邀請；招致；引起", "note": "除「邀請」外也常指招致", "example": "Careless remarks may invite criticism.", "translation": "輕率的言論可能招致批評。"}, "irrational": {"pos": "adj.", "definition": "不理性的；不合理的", "note": "反義：rational", "example": "His fear of harmless insects is irrational.", "translation": "他對無害昆蟲的恐懼是不理性的。"}, "liberal": {"pos": "adj./n.", "definition": "開明的；自由派的；大量的", "note": "政治語境另有特定含義", "example": "The school takes a liberal approach to education.", "translation": "這所學校採取較開明的教育方式。"}, "limb": {"pos": "n.", "definition": "肢；樹枝", "note": "可指手臂、腿或大型樹枝", "example": "The injured bird could not move one of its limbs.", "translation": "那隻受傷的鳥無法移動其中一隻肢體。"}, "litter": {"pos": "v./n.", "definition": "亂丟垃圾；使散亂；垃圾", "note": "常用被動：be littered with", "example": "Plastic bottles littered the beach after the festival.", "translation": "節慶過後，塑膠瓶散落在海灘各處。"}, "methodically": {"pos": "adv.", "definition": "有條理地；有系統地", "note": "形容詞：methodical", "example": "She checked each document methodically.", "translation": "她有條理地逐一檢查每份文件。"}, "monitor": {"pos": "v./n.", "definition": "監控；監視器", "note": "名詞可指螢幕或監測器", "example": "Doctors closely monitored the patient's condition.", "translation": "醫師密切監控病人的狀況。"}, "mounted": {"pos": "v./adj.", "definition": "增加；登上；安裝的", "note": "原形 mount；常用：pressure/tension mounted", "example": "Pressure mounted as the deadline approached.", "translation": "隨著截止日期逼近，壓力不斷增加。"}, "nanoparticle": {"pos": "n.", "definition": "奈米粒子", "note": "不是「奈米分子」", "example": "The researchers used nanoparticles to deliver the drug.", "translation": "研究人員利用奈米粒子輸送藥物。"}, "numbing": {"pos": "adj.", "definition": "令人麻木的；使人失去感覺的", "note": "也可比喻情緒麻木", "example": "A numbing cold spread through his fingers.", "translation": "刺骨寒意使他的手指逐漸麻木。"}, "plague": {"pos": "v./n.", "definition": "困擾；折磨；瘟疫", "note": "常用被動：be plagued by/with", "example": "Technical problems plagued the project from the beginning.", "translation": "技術問題從一開始就困擾著這項計畫。"}, "possession": {"pos": "n.", "definition": "擁有；所有物；財產", "note": "複數常指個人物品", "example": "Please keep your valuable possessions with you.", "translation": "請隨身保管貴重物品。"}, "property": {"pos": "n.", "definition": "財產；性質；特性", "note": "多義字", "example": "This substance has several useful chemical properties.", "translation": "這種物質具有數種實用的化學性質。"}, "recite": {"pos": "v.", "definition": "背誦；朗誦", "note": "常搭 poem/speech", "example": "The child recited the poem from memory.", "translation": "那個孩子憑記憶背誦了這首詩。" hrase", "definition": "與……融合；混合", "note": "也可用 blend into", "example": "The building blends with the surrounding landscape.", "translation": "這棟建築與周圍景觀融為一體。"}, "by no means": {"pos": "idiom", "definition": "絕不；一點也不", "note": "置於句首時可能倒裝", "example": "The task is by no means easy.", "translation": "這項任務絕不容易。"}, "call into question": {"pos": "phrase", "definition": "使人懷疑；質疑", "note": "常用：call sth into question", "example": "The new evidence calls his story into question.", "translation": "新證據使人開始懷疑他的說法。"}, "call up": {"pos": "phr. v.", "definition": "打電話；喚起（記憶）", "note": "多義片語", "example": "The old song called up memories of my childhood.", "translation": "那首老歌喚起了我的童年回憶。"}, "cast doubt on": {"pos": "phrase", "definition": "使人懷疑；對……投下疑問", "note": "主詞常為 evidence/report", "example": "The report casts doubt on the accuracy of the data.", "translation": "這份報告使人懷疑數據的準確性。"}, "chew over": {"pos": "phr. v.", "definition": "反覆思考；仔細考慮", "note": "較口語", "example": "Let me chew over your proposal before I decide.", "translation": "讓我仔細想想你的提案再決定。"}, "come to a standstill": {"pos": "phrase", "definition": "陷入停頓；完全停止", "note": "固定搭配", "example": "Production came to a standstill during the power outage.", "translation": "停電期間，生產完全停擺。"}, "descend upon": {"pos": "phr. v.", "definition": "突然大批到來；降臨", "note": "語氣常帶突然與大量", "example": "Thousands of tourists descended upon the town.", "translation": "數千名遊客突然湧入這座小鎮。"}, "do a favor for": {"pos": "phrase", "definition": "幫……一個忙", "note": "更常說 do sb a favor", "example": "Could you do a favor for me and check this file?", "translation": "你可以幫我一個忙，檢查這個檔案嗎？"}, "doom to": {"pos": "phrase", "definition": "使某人注定遭受……", "note": "常用：doom sth to failure", "example": "Poor planning doomed the project to failure.", "translation": "規劃不周使這項計畫注定失敗。"}, "dwell on": {"pos": "phr. v.", "definition": "老是想著；詳述", "note": "後接名詞", "example": "There is no point in dwelling on past mistakes.", "translation": "一直糾結過去的錯誤沒有意義。"}, "economic recession": {"pos": "noun phrase", " e entitled to paid leave.", "translation": "員工有權享有有薪假。"}, "delivery": {"pos": "n.", "definition": "運送；遞送", "note": "during delivery", "example": "The goods were damaged during delivery.", "translation": "貨物在運送過程中受損。"}, "ripe": {"pos": "adj.", "definition": "成熟的；時機成熟的", "note": "ripe fruit; time is ripe", "example": "The fruit is fully ripe.", "translation": "這個水果已完全成熟。"}, "prevalent": {"pos": "adj.", "definition": "普遍的；盛行的", "note": "prevalent among/in", "example": "The disease is prevalent in tropical regions.", "translation": "這種疾病在熱帶地區很普遍。"}, "vague": {"pos": "adj.", "definition": "模糊的；不明確的", "note": "vague answer/memory", "example": "He gave a vague answer.", "translation": "他給了一個模糊的回答。"}, "powered": {"pos": "adj./p.p.", "definition": "由……驅動的；供能的", "note": "powered by", "example": "The machine is powered by electricity.", "translation": "這台機器由電力驅動。"}, "charisma": {"pos": "n.", "definition": "魅力；感召力", "note": "great charisma", "example": "The actor's charisma attracted a large audience.", "translation": "那位演員的魅力吸引了大量觀眾。"}, "irresistible": {"pos": "adj.", "definition": "無法抗拒的", "note": "an irresistible attraction", "example": "The smell of fresh bread was irresistible.", "translation": "新鮮麵包的香味令人無法抗拒。"}, "crucial": {"pos": "adj.", "definition": "關鍵的；極重要的", "note": "play a crucial role/part", "example": "Communication plays a crucial role in teamwork.", "translation": "溝通在團隊合作中扮演關鍵角色。"}, "artifact": {"pos": "n.", "definition": "人工製品；文化遺物；人造設施", "note": "ancient/urban artifact", "example": "The museum displayed ancient artifacts.", "translation": "博物館展示古代文物。"}, "pedestrian": {"pos": "n./adj.", "definition": "行人；行人的", "note": "pedestrian crossing", "example": "Pedestrians should use the crosswalk.", "translation": "行人應使用斑馬線。"}, "haven": {"pos": "n.", "definition": "避難所；安全處所", "note": "a haven for", "example": "The shelter became a haven for homeless people.", "translation": "這間收容所成為無家者的避難處。"}, "ventilator": {"pos": "n.", "definition": "通風設備；呼吸器", "note": "air ventila ation": "這種信念在社會中根深蒂固。"}, "rivalry between": {"pos": "phrase", "definition": "A 與 B 之間的競爭／對立", "note": "rivalry between A and B", "example": "There is a fierce rivalry between the two teams.", "translation": "兩隊之間有激烈競爭。"}, "respiratory illness": {"pos": "phrase", "definition": "呼吸道疾病", "note": "respiratory illness", "example": "The virus causes respiratory illness.", "translation": "這種病毒造成呼吸道疾病。"}, "adult supervision": {"pos": "phrase", "definition": "成人監督", "note": "adult supervision", "example": "Children need adult supervision.", "translation": "兒童需要成人監督。"}, "arm oneself with": {"pos": "phrase", "definition": "用……裝備自己", "note": "arm oneself with + N", "example": "Arm yourself with knowledge before the exam.", "translation": "考試前用知識充實自己。"}, "a panacea for": {"pos": "phrase", "definition": "解決……的萬靈丹", "note": "a panacea for + N", "example": "There is no panacea for every problem.", "translation": "沒有能解決所有問題的萬靈丹。"}, "around the clock": {"pos": "phrase", "definition": "日以繼夜；全天候", "note": "around the clock", "example": "The rescue team worked around the clock.", "translation": "救援隊日以繼夜地工作。"}, "put up with": {"pos": "phrase", "definition": "忍受……", "note": "put up with + N", "example": "I cannot put up with the noise.", "translation": "我無法忍受噪音。"}, "only to": {"pos": "phrase", "definition": "結果卻……", "note": "only to + V", "example": "He arrived early, only to find the office closed.", "translation": "他提早抵達，結果卻發現辦公室關門。"}, "spend time-ing": {"pos": "phrase", "definition": "花時間做……", "note": "spend time + V-ing", "example": "She spends two hours studying every day.", "translation": "她每天花兩小時讀書。"}, "be entitled to/V": {"pos": "phrase", "definition": "有權獲得／做……", "note": "be entitled to + N/V", "example": "Employees are entitled to paid leave.", "translation": "員工有權享有有薪假。"}, "S was/were V-ing when S": {"pos": "phrase", "definition": "正在做……時，另一件事發生", "note": "S was/were V-ing when S + V", "example": "I was driving when I saw him.", "translation": "我正在開車時看見他。"}, "as though": {"pos": "phrase", "definition": "彷彿／好像……", "note": "as though + S + V", "example": "She turned away as though she would leave.", "translation": "她轉過身，彷彿要離開。"}, "expect": {"pos": "phrase", "definition": "期待 B 具備／做到 A", "note": "expect A of B", "example": "Much is expected of young people.", "translation": "社會對年輕人抱有很高期待。"}, "neither A nor B": {"pos": "phrase", "definition": "既不 A 也不 B", "note": "neither A nor B", "example": "He can neither speak nor walk.", "translation": "他既不能說話，也不能走路。"}, "powered by": {"pos": "phrase", "definition": "由……驅動／供能", "note": "powered by + N", "example": "The device is powered by batteries.", "translation": "這個裝置由電池供電。"}, "despite/V-ing": {"pos": "phrase", "definition": "儘管……", "note": "despite + N/V-ing", "example": "Despite the rain, we went out.", "translation": "儘管下雨，我們仍外出。"}, "bond with": {"pos": "phrase", "definition": "與……建立感情", "note": "bond with + 人", "example": "The parents bonded with the child.", "translation": "父母與孩子建立了深厚感情。"}, "wear off": {"pos": "phrase", "definition": "逐漸消退；逐漸失效", "note": "wear off", "example": "The effect of the medicine wore off.", "translation": "藥效逐漸消退。"}, "get across": {"pos": "phrase", "definition": "傳達清楚；使人理解", "note": "get across", "example": "I could not get my point across.", "translation": "我無法把觀點講清楚。"}, "stack up": {"pos": "phrase", "definition": "堆積；比較起來", "note": "stack up", "example": "How does this product stack up against its rivals?", "translation": "這項產品和競爭者相比如何？"}, "turn": {"pos": "phrase", "definition": "把 A 變成 B", "note": "turn A into B", "example": "The experience turned him into a stronger person.", "translation": "這次經歷使他變得更堅強。"}, "here and now": {"pos": "phrase", "definition": "此時此刻", "note": "here and now", "example": "Try to live in the here and now.", "translation": "試著活在當下。"}, "play a crucial part in": {"pos": "phrase", "definition": "在……扮演關鍵角色", "note": "play a crucial part in", "example": "Trust plays a crucial part in cooperation.", "translation": "信任在合作中扮演關鍵角色。"}, "serve as": {"p ", "definition": "引起；造成……", "note": "give rise to + N", "example": "The rumor gave rise to fear.", "translation": "謠言引起恐慌。"}, "simplify": {"pos": "v.", "definition": "簡化", "note": "simplify an explanation/process", "example": "The scientist tried to simplify her findings so that non-experts could understand them.", "translation": "這位科學家試著簡化研究結果，讓非專業人士也能理解。"}, "exaggerate": {"pos": "v.", "definition": "誇大", "note": "exaggerate the importance/risk", "example": "The report did not exaggerate the seriousness of the problem.", "translation": "這份報告沒有誇大問題的嚴重性。"}, "dismiss": {"pos": "v.", "definition": "不理會；駁回", "note": "dismiss concerns/claims", "example": "It would be unwise to dismiss the concerns raised by local residents.", "translation": "忽視當地居民提出的疑慮是不明智的。"}, "fragile": {"pos": "adj.", "definition": "脆弱的；易碎的", "note": "fragile relationship/agreement", "example": "The peace agreement remains extremely fragile.", "translation": "這項和平協議仍然極為脆弱。"}, "harmful": {"pos": "adj.", "definition": "有害的", "note": "be harmful to", "example": "The chemicals may be harmful to marine life.", "translation": "這些化學物質可能對海洋生物有害。"}, "luxurious": {"pos": "adj.", "definition": "奢華的", "note": "luxurious accommodation", "example": "The hotel provides luxurious rooms and private pools.", "translation": "這家飯店提供奢華客房與私人泳池。"}, "wasteful": {"pos": "adj.", "definition": "浪費的", "note": "wasteful practice", "example": "Leaving the lights on all night is both costly and wasteful.", "translation": "整晚開著燈既花錢又浪費。"}, "sustainable": {"pos": "adj.", "definition": "永續的", "note": "sustainable development/practice", "example": "The city is seeking a more sustainable transportation system.", "translation": "這座城市正尋求更永續的交通系統。"}, "postponed": {"pos": "v./p.p.", "definition": "延期", "note": "postpone a meeting", "example": "The meeting was postponed until the following week.", "translation": "會議被延到下一週。"}, "misused": {"pos": "v./p.p.", "definition": "誤用；濫用", "note": "misuse data/authority", "example": "Personal data may be misused if clear rules are absent.", "translation": "若缺乏明確規範，個人資料可能遭到濫用。"}, "ingested": {"pos": "v./p.p.", "definition": "攝入；吞下", "note": "ingest food/chemicals", "example": "The substance can be dangerous if ingested in large amounts.", "translation": "大量攝入此物質可能有危險。"}, "tense": {"pos": "adj.", "definition": "緊張的", "note": "tense atmosphere", "example": "His rude remark made the atmosphere even more tense.", "translation": "他的無禮言論讓氣氛更加緊張。"}, "engaged": {"pos": "adj./p.p.", "definition": "投入的；參與的", "note": "be engaged in", "example": "Students were highly engaged in the discussion.", "translation": "學生非常投入這場討論。"}, "enforced": {"pos": "v./p.p.", "definition": "執行；強制實施", "note": "enforce a law/rule", "example": "The new law will work only if it is properly enforced.", "translation": "新法律只有在被妥善執行時才會有效。"}, "neglect": {"pos": "v.", "definition": "忽視；疏忽", "note": "neglect duties/safety", "example": "Do not neglect safety checks before operating the machine.", "translation": "操作機器前不要忽視安全檢查。"}, "overtake": {"pos": "v.", "definition": "超越；趕上", "note": "overtake a competitor", "example": "The smaller company hopes to overtake its main competitor.", "translation": "這家較小的公司希望超越主要競爭對手。"}, "escalate": {"pos": "v.", "definition": "升級；加劇", "note": "escalate tensions/conflict", "example": "The conflict could escalate if neither side compromises.", "translation": "若雙方都不妥協，衝突可能升級。"}, "collide": {"pos": "v.", "definition": "碰撞；衝突", "note": "collide with", "example": "The two vehicles nearly collide at the intersection.", "translation": "兩輛車在路口差點相撞。"}, "merge": {"pos": "v.", "definition": "合併", "note": "merge with", "example": "The two companies decided to merge in order to expand their market share.", "translation": "兩家公司決定合併，以擴大市占率。"}, "refund": {"pos": "n./v.", "definition": "退款；退還", "note": "request a refund", "example": "Passengers may request a refund when a flight is canceled.", "translation": "航班取消時，乘客可以要求退款。"}, "nurture": {"pos": "v.", "definition": "培養；滋養", "note": "nurture talent/curiosity", "example": "Good teachers nurture curiosity and confidence in their students.", "translation": "好老師會培養學生的好奇心與自信。"}, "provoke": {"pos": "v.", "definition": "引發；激起", "note": "provoke a reaction/emotion", "example": "The artwork was designed to provoke strong emotions.", "translation": "這件藝術作品旨在激起強烈情緒。"}, "distort": {"pos": "v.", "definition": "扭曲；歪曲", "note": "distort facts/information", "example": "Selective reporting can distort the public's understanding of an issue.", "translation": "選擇性報導可能扭曲大眾對議題的理解。"}, "convey": {"pos": "v.", "definition": "傳達", "note": "convey a message/meaning", "example": "The speaker used a simple example to convey the main idea.", "translation": "講者用簡單例子傳達主要概念。"}, "thorough": {"pos": "adj.", "definition": "徹底的；詳盡的", "note": "thorough investigation/review", "example": "The committee conducted a thorough investigation.", "translation": "委員會進行了詳盡調查。"}, "articulated": {"pos": "v./p.p.", "definition": "清楚表達", "note": "articulate an idea", "example": "The proposal was clearly articulated during the meeting.", "translation": "這項提案在會議中被清楚表達。"}, "expanded": {"pos": "v./p.p.", "definition": "擴大；擴展", "note": "expand access/programs", "example": "The university has expanded its online learning programs.", "translation": "這所大學已擴大線上學習課程。"}, "discourage": {"pos": "v.", "definition": "阻止；使洩氣", "note": "discourage A from V-ing", "example": "High fees may discourage students from applying.", "translation": "高額費用可能使學生不敢申請。"}, "foster": {"pos": "v.", "definition": "促進；培養", "note": "foster cooperation/dialogue", "example": "The program aims to foster dialogue among researchers.", "translation": "這項計畫旨在促進研究人員之間的對話。"}, "restrict": {"pos": "v.", "definition": "限制", "note": "restrict access/use", "example": "The new policy may restrict access to certain services.", "translation": "新政策可能限制取得某些服務。"}, "tariff": {"pos": "n.", "definition": "關稅", "note": "impose a tariff on", "example": "The government imposed a 10 percent tariff on imported goods.", ion": "個人化調整措施", "note": "provide personalized accommodations", "example": "Some employees benefit from personalized accommodations at work.", "translation": "有些員工受益於職場上的個人化調整措施。"}, "normalize": {"pos": "v.", "definition": "使正常化；使常態化", "note": "normalize behavior", "example": "The goal is not to normalize everyone but to respect differences.", "translation": "目標不是讓每個人都變得一樣，而是尊重差異。"}, "celebrate": {"pos": "v.", "definition": "肯定；讚揚；慶祝", "note": "celebrate diversity", "example": "The campaign encourages people to celebrate human differences.", "translation": "這項活動鼓勵人們肯定人類差異。"}, "contradictory": {"pos": "adj.", "definition": "矛盾的", "note": "contradictory statements", "example": "The witnesses gave contradictory accounts of the event.", "translation": "目擊者對事件提供了互相矛盾的說法。"}, "achievable": {"pos": "adj.", "definition": "可達成的", "note": "achievable goal", "example": "The team set realistic and achievable goals.", "translation": "團隊設定實際且可達成的目標。"}, "reliable": {"pos": "adj.", "definition": "可靠的", "note": "reliable source/evidence", "example": "The study needs more reliable evidence.", "translation": "這項研究需要更可靠的證據。"}, "accommodate": {"pos": "v.", "definition": "容納；配合；滿足需要", "note": "accommodate needs", "example": "The new policy can accommodate different learning needs.", "translation": "新政策能配合不同的學習需求。"}, "standardize": {"pos": "v.", "definition": "使標準化", "note": "standardize procedures", "example": "It is difficult to standardize ethical rules across cultures.", "translation": "要讓倫理規範跨文化標準化很困難。"}, "interrupt": {"pos": "v.", "definition": "打斷；中斷", "note": "interrupt a conversation", "example": "Please do not interrupt the speaker.", "translation": "請不要打斷講者。"}, "innovation": {"pos": "n.", "definition": "創新", "note": "technological innovation", "example": "Technological innovation can improve access to education.", "translation": "科技創新可以改善教育可及性。"}, "generative AI": {"pos": "n. phrase", "definition": "生成式人工智慧", "note": "generative AI content", "example": "Concerns have emerged ove  study revealed significant cultural variation in moral preferences.", "translation": "研究顯示道德偏好存在明顯文化差異。"}, "black-box recorder": {"pos": "n. phrase", "definition": "黑盒紀錄器", "note": "install a black-box recorder", "example": "Every autonomous vehicle may be required to carry a black-box recorder.", "translation": "每輛自駕車可能都必須配備黑盒紀錄器。"}, "accident responsibility": {"pos": "n. phrase", "definition": "事故責任", "note": "determine accident responsibility", "example": "The device can help determine accident responsibility.", "translation": "該裝置有助判定事故責任。"}, "properties": {"pos": "n.", "definition": "財產；性質；特性", "note": "多義字", "example": "This substance has several useful chemical properties.", "translation": "這種物質具有數種實用的化學性質。"}, "shrank back": {"pos": "phr. v.", "definition": "退縮；畏縮", "note": "過去式 shrank", "example": "The child shrank back when the dog barked.", "translation": "狗一叫，那個孩子便嚇得往後退。"}, "sprung up": {"pos": "phr. v.", "definition": "突然出現；迅速興起", "note": "過去分詞 sprung", "example": "New cafés have sprung up all over the neighborhood.", "translation": "附近突然開了許多新咖啡館。"}, "occupants": {"pos": "n.", "definition": "乘員；居住者", "note": "vehicle occupant", "example": "The vehicle must protect every occupant.", "translation": "車輛必須保護每位乘員。"}, "obstruct": {"pos": "v.", "definition": "阻礙；妨礙", "note": "obstruct traffic/progress", "example": "Fallen trees may obstruct emergency vehicles after the storm.", "translation": "暴風雨後，倒下的樹木可能阻礙緊急車輛通行。"}, "comprise": {"pos": "v.", "definition": "包含；由……組成", "note": "comprise = consist of；主動表示「包含」", "example": "The committee will comprise experts from five different fields.", "translation": "委員會將由五個不同領域的專家組成。"}, "breach": {"pos": "n./v.", "definition": "違反；破壞；漏洞", "note": "security/data breach", "example": "The company reported a serious security breach last night.", "translation": "公司昨晚通報一起嚴重的資安漏洞。"}, "misinterpret": {"pos": "v.", "definition": "誤解；曲解", "note": "misinterpret data/remarks", "example": "Readers may misinterpret the graph if the labels are unclear.", "translation": "若標示不清，讀者可能誤解圖表。"}, "restrain": {"pos": "v.", "definition": "抑制；約束", "note": "restrain oneself/someone", "example": "The officer tried to restrain the angry passenger without using force.", "translation": "警員試圖在不使用武力的情況下制止憤怒的乘客。"}, "coerce": {"pos": "v.", "definition": "強迫；脅迫", "note": "coerce A into V-ing", "example": "No employee should be coerced into signing the document.", "translation": "任何員工都不應被迫簽署該文件。"}, "repress": {"pos": "v.", "definition": "壓抑；鎮壓", "note": "repress emotions/memories", "example": "Constantly trying to repress emotions may increase stress.", "translation": "不斷壓抑情緒可能增加壓力。"}, "assuage": {"pos": "v.", "definition": "緩和；減輕", "note": "assuage fears/concerns", "example": "The manager apologized to assuage customers' concerns.", "translation": "經理道歉以緩和顧客的疑慮。"}, "exacerbate": {"pos": "v.", "definition": "使惡化；加劇", "note": "exacerbate a problem/symptom", "example": "A lack of sleep can exacerbate anxiety and irritability.", "translation": "睡眠不足可能加劇焦慮與易怒。"}, "alleviate": {"pos": "v.", "definition": "減輕；緩和", "note": "alleviate pain/poverty", "example": "The new treatment may alleviate chronic pain.", "translation": "新療法可能減輕慢性疼痛。"}, "deplete": {"pos": "v.", "definition": "耗盡；大量消耗", "note": "deplete resources/reserves", "example": "Years of drought have depleted the region's water reserves.", "translation": "多年乾旱已耗盡該地區的水資源。"}, "hoard": {"pos": "v./n.", "definition": "囤積；貯藏", "note": "hoard food/money", "example": "People were warned not to hoard medical supplies during the emergency.", "translation": "民眾被警告在緊急期間不要囤積醫療用品。"}, "scrutinize": {"pos": "v.", "definition": "仔細審查", "note": "scrutinize evidence/documents", "example": "Investors should scrutinize the contract before signing it.", "translation": "投資人簽約前應仔細審查合約。"}, "groundbreaking": {"pos": "adj.", "definition": "開創性的；突破性的", "note": "groundbreaking research/discovery", "example": "The researchers announced a groundbreaking discovery in gene therapy.", "translation": "研究人員宣布一項基因治療的突破性發現。"}, "paramount": {"pos": "adj.", "definition": "最重要的；至高無上的", "note": "of paramount importance", "example": "Passenger safety is of paramount importance to the airline.", "translation": "乘客安全對航空公司而言最為重要。"}, "trajectory": {"pos": "n.", "definition": "軌跡；發展路徑", "note": "growth/career trajectory", "example": "The policy could alter the country's economic trajectory.", "translation": "這項政策可能改變該國的經濟發展路徑。"}, "moratorium": {"pos": "n.", "definition": "暫停；延期執行", "note": "impose/lift a moratorium on", "example": "The city imposed a temporary moratorium on new construction.", "translation": "市政府暫停核准新的建築工程。"}, "prevalence": {"pos": "n.", "definition": "盛行率；普遍程度", "note": "the prevalence of", "example": "The study examined the prevalence of anxiety among university students.", "translation": "研究調查大學生焦慮症的盛行率。"}, "pervasive": {"pos": "adj.", "definition": "無所不在的；普遍的", "note": "pervasive influence/problem", "example": "Smartphone use has become pervasive in modern society.", "translation": "智慧型手機的使用在現代社會已無所不在。"}, "detrimental": {"pos": "adj.", "definition": "有害的；不利的", "note": "be detrimental to", "example": "Excessive screen time may be detrimental to children's sleep.", "translation": "過多螢幕時間可能不利於兒童睡眠。"}, "legislation": {"pos": "n.", "definition": "立法；法律", "note": "pass/enact legislation", "example": "The government introduced new legislation to protect personal data.", "translation": "政府提出新法規以保護個人資料。"}, "autonomy": {"pos": "n.", "definition": "自主權；自治", "note": "personal/professional autonomy", "example": "The policy gives teachers greater autonomy in the classroom.", "translation": "這項政策給予教師更大的課堂自主權。"}, "flexibility": {"pos": "n.", "definition": "彈性；靈活性", "note": "offer/provide flexibility", "example": "Remote work offers employees greater flexibility in managing their schedules.", "translation": "遠距工作讓員工能更彈性地安排時間。"}, "compliance": {"pos": "n.", "definition": "遵守；依從", "note": "compliance with", "example": "Regular inspections ensure compliance with safety regulations.", "translation": "定期檢查可確保遵守安全規範。"}, "pivotal": {"pos": "adj.", "definition": "關鍵的；核心的", "note": "play a pivotal role", "example": "Her testimony played a pivotal role in the investigation.", "translation": "她的證詞在調查中扮演關鍵角色。"}, "semiconductor": {"pos": "n.", "definition": "半導體", "note": "semiconductor industry/chip", "example": "Taiwan is a major producer of advanced semiconductor chips.", "translation": "台灣是先進半導體晶片的重要生產地。"}, "fabrication": {"pos": "n.", "definition": "製造；捏造", "note": "semiconductor fabrication", "example": "The company invested heavily in chip fabrication facilities.", "translation": "公司大力投資晶片製造設施。"}, "linchpin": {"pos": "n.", "definition": "關鍵人物；核心要素", "note": "the linchpin of", "example": "Skilled engineers are the linchpin of the expansion plan.", "translation": "熟練工程師是擴張計畫的核心。"}, "dominance": {"pos": "n.", "definition": "支配地位；優勢", "note": "market dominance", "example": "The firm is trying to maintain its market dominance.", "translation": "該公司正試圖維持市場主導地位。"}, "diminishment": {"pos": "n.", "definition": "減少；削弱", "note": "the diminishment of", "example": "Experts are concerned about the diminishment of local expertise.", "translation": "專家擔心本地專業能力遭到削弱。"}, "hereditary": {"pos": "adj.", "definition": "遺傳的", "note": "hereditary disease/deafness", "example": "The disorder is hereditary and may be passed from parent to child.", "translation": "這種疾病具有遺傳性，可能由父母傳給子女。"}, "cochlear implant": {"pos": "n. phrase", "definition": "人工電子耳", "note": "receive a cochlear implant", "example": "The child received a cochlear implant to improve her hearing.", "translation": "這名兒童接受人工電子耳植入以改善聽力。"}, "conventional": {"pos": "adj.", "definition": "傳統的；慣常的", "note": "conventional method/treatment", "example": "The patient did not respond to conventional treatment.", "translation": "病人對傳統治療沒有反應。"}, "remarkable": {"pos": "adj.", "definition": "非凡的；顯著的", "note": "remarkable progress/achievement", "example": "The children showed remarkable improvement after therapy.", "translation": "孩子們接受治療後出現顯著改善。"}, "astonished": {"pos": "adj.", "definition": "驚訝的", "note": "be astonished at/by", "example": "The researchers were astonished by the speed of the recovery.", "translation": "研究人員對康復速度感到驚訝。"}, "incidental": {"pos": "adj.", "definition": "附帶的；偶然的", "note": "incidental finding", "example": "The scan revealed an incidental finding unrelated to the original complaint.", "translation": "掃描發現一項與原本症狀無關的偶然結果。"}, "susceptible": {"pos": "adj.", "definition": "易受影響的；易患病的", "note": "be susceptible to", "example": "Young children are particularly susceptible to respiratory infections.", "translation": "幼童特別容易感染呼吸道疾病。"}, "connectivity": {"pos": "n.", "definition": "連結性；連通性", "note": "brain/network connectivity", "example": "Air pollution may reduce connectivity between brain networks.", "translation": "空氣污染可能降低腦部網絡間的連結性。"}, "mutualism": {"pos": "n.", "definition": "互利共生", "note": "ecological mutualism", "example": "The relationship benefits both species and is an example of mutualism.", "translation": "這種關係讓兩個物種都受益，是互利共生的例子。"}, "migratory": {"pos": "adj.", "definition": "遷徙的", "note": "migratory birds/fish", "example": "The wetlands provide food for migratory birds.", "translation": "這片濕地為候鳥提供食物。"}, "adept": {"pos": "adj.", "definition": "熟練的；擅長的", "note": "be adept at + V-ing", "example": "The dolphins are adept at guiding fish toward the nets.", "translation": "海豚擅長將魚群引向漁網。"}, "exemplify": {"pos": "v.", "definition": "作為……的典範；例示", "note": "exemplify a principle", "example": "This partnership exemplifyies cooperation between humans and animals.", "translation": "這種夥伴關係展現人類與動物間的合作。"}, "renowned": {"pos": "adj.", "definition": "著名的；享有盛名的", "note": "be renowned for", "example": "The scientist is renowned for her work on memory.", "translation": "這名科學家以記憶研究聞名。"}, "summon": {"pos": "v.", "definition": "召喚；傳喚", "note": "summon help/courage", "example": "The whistle is used to summon the birds during a honey hunt.", "translation": "狩獵蜂蜜時，人們用口哨召喚鳥類。"}, "beeswax": {"pos": "n.", "definition": "蜂蠟", "note": "honey and beeswax", "example": "The villagers collected honey and beeswax from the nest.", "translation": "村民從蜂巢中採集蜂蜜與蜂蠟。"}, "indigenous": {"pos": "adj.", "definition": "原住民的；本土的", "note": "indigenous peoples/cultures", "example": "The museum highlights indigenous knowledge and traditions.", "translation": "博物館呈現原住民知識與傳統。"}, "facilitate": {"pos": "v.", "definition": "促進；使便利", "note": "facilitate learning/cooperation", "example": "Clear instructions can facilitate communication between the two teams.", "translation": "清楚指示能促進兩個團隊間的溝通。"}, "domestication": {"pos": "n.", "definition": "馴化；馴養", "note": "animal domestication", "example": "The study examines the early domestication of wolves.", "translation": "研究探討狼早期被馴化的過程。"}, "bias": {"pos": "n./v.", "definition": "偏見；偏差", "note": "confirmation/research bias", "example": "Researchers must design experiments that minimize bias.", "translation": "研究人員必須設計能降低偏差的實驗。"}, "pseudoscience": {"pos": "n.", "definition": "偽科學", "note": "distinguish science from pseudoscience", "example": "Claims that cannot be tested may belong to pseudoscience rather than science.", "translation": "無法被檢驗的主張可能屬於偽科學而非科學。"}, "empirical": {"pos": "adj.", "definition": "實證的；以觀察為基礎的", "note": "empirical evidence/research", "example": "The theory must be supported by empirical evidence.", "translation": "這項理論必須有實證證據支持。"}, "external": {"pos": "adj.", "definition": "外部的", "note": "external factor/pressure", "example": "Skin aging can be accelerated by external factors such as pollution.", "translation": "污染等外部因素可能加速皮膚老化。"}, "internal": {"pos": "adj.", "definition": "內部的；內在的", "note": "internal conflict/system", "example": "The audit uncovered serious internal communication problems.", "translation": "稽核發現嚴重的內部溝通問題。"}, "meager": {"pos": "adj.", "definition": "不足的；微薄的", "note": "meager income/resources", "example": "The family survived on a meager supply of food.", "translation": "這家人靠少量食物維生。"}, "expectancy": {"pos": "n.", "definition": "預期；期望壽命", "note": "life expectancy", "example": "Average life expectancy has risen in many countries.", "translation": "許多國家的平均壽命已提高。"}, "petrified": {"pos": "adj.", "definition": "嚇呆的；極度害怕的", "note": "be petrified of/with fear", "example": "The child was petrified when she saw the snake.", "translation": "孩子看到蛇時嚇呆了。"}, "ostracized": {"pos": "adj./p.p.", "definition": "被排斥的", "note": "be ostracized by/from", "example": "He felt ostracized by his classmates after the argument.", "translation": "爭吵後，他覺得自己被同學排斥。"}, "aggravated": {"pos": "v./p.p.", "definition": "使惡化；激怒", "note": "aggravate a condition/problem", "example": "The loud noise aggravated her headache.", "translation": "巨大的噪音使她的頭痛惡化。"}, "antibiotics": {"pos": "n. pl.", "definition": "抗生素", "note": "take/prescribe antibiotics", "example": "Doctors prescribe antibiotics only for bacterial infections.", "translation": "醫師只針對細菌感染開抗生素。"}, "anesthetics": {"pos": "n. pl.", "definition": "麻醉劑", "note": "local/general anesthetics", "example": "Local anesthetics were used during the minor operation.", "translation": "小型手術中使用了局部麻醉劑。"}, "hypnotic": {"pos": "adj./n.", "definition": "催眠的；催眠藥", "note": "hypnotic effect/drug", "example": "The medicine has a mild hypnotic effect.", "translation": "這種藥物有輕微催眠效果。"}, "condiment": {"pos": "n.", "definition": "調味料", "note": "common condiment", "example": "Mustard is a common condiment served with hamburgers.", "translation": "芥末是漢堡常搭配的調味料。"}, "emphatic": {"pos": "adj.", "definition": "強調的；斷然的", "note": "emphatic denial/refusal", "example": "She gave an emphatic refusal to the proposal.", "translation": "她斷然拒絕了這項提案。"}, "initiative": {"pos": "n.", "definition": "主動性；倡議", "note": "take the initiative", "example": "Employees are encouraged to take the initiative in solving problems.", "translation": "公司鼓勵員工主動解決問題。"}, "hard-wired": {"pos": "adj.", "definition": "天生的；與生俱來的", "note": "hard-wired response", "example": "Some fear responses may be hard-wired in the human brain.", "translation": "有些恐懼反應可能天生存在於人腦中。"}, "locally grown produce": {"pos": "n. phrase", "definition": "在地農產品", "note": "buy locally grown produce", "example": "The market sells fresh locally grown produce from nearby farms.", "translation": "市場販售附近農場的新鮮在地農產品。"}, "deeply held values": {"pos": "n. phrase", "definition": "根深蒂固的價值觀", "note": "respect deeply held values", "example": "People often bring their deeply held values into the workplace.", "translation": "人們常把根深蒂固的價值觀帶入職場。"}, "arboreal": {"pos": "adj.", "definition": "樹棲的", "note": "arboreal animals/life", "example": "These primates are arboreal and spend most of their lives in trees.", "translation": "這些靈長類是樹棲動物，大部分時間都在樹上。"}, "tactile": {"pos": "adj.", "definition": "觸覺的；可觸摸的", "note": "tactile sensation/feedback", "example": "The experiment measured participants' tactile responses.", "translation": "實驗測量受試者的觸覺反應。"}, "prosimian": {"pos": "n./adj.", "definition": "原猴類；原猴類的", "note": "early prosimian", "example": "The fossil resembled an early prosimian that lived in tropical forests.", "translation": "該化石類似生活於熱帶森林的早期原猴類。"}, "widespread agreement": {"pos": "n. phrase", "definition": "廣泛共識", "note": "reach widespread agreement", "example": "There is widespread agreement that the policy needs revision.", "translation": "各界廣泛同意這項政策需要修正。"}, "factual information": {"pos": "n. phrase", "definition": "事實資訊", "note": "verify factual information", "example": "A reliable reference book should provide accurate factual information.", "translation": "可靠的參考書應提供正確的事實資訊。"}, "criterion": {"pos": "n.", "definition": "標準；準則", "note": "criterion (單數)；criteria (複數)", "example": "Cost is only one criterion used to evaluate the proposal.", "translation": "成本只是評估提案的其中一項標準。"}, "rigorous": {"pos": "adj.", "definition": "嚴謹的；嚴格的", "note": "rigorous testing/analysis", "example": "The claim must undergo rigorous scientific testing.", "translation": "這項主張必須接受嚴謹的科學測試。"}, "recollection": {"pos": "n.", "definition": "回憶；記憶力", "note": "have no recollection of", "example": "Her recollection of the accident was surprisingly detailed.", "translation": "她對事故的回憶出奇地詳細。"}, "retention": {"pos": "n.", "definition": "保留；記憶保持", "note": "memory/employee retention", "example": "Sleep plays an important role in memory retention.", "translation": "睡眠對記憶保持很重要。"}, "intentional forgetting": {"pos": "n. phrase", "definition": "刻意遺忘", "note": "intentional forgetting of information", "example": "The researchers studied whether intentional forgetting requires conscious effort.", "translation": "研究人員探討刻意遺忘是否需要有意識的努力。"}, "cognitive processes": {"pos": "n. phrase", "definition": "認知過程", "note": "affect cognitive processes", "example": "Air pollution may interfere with important cognitive processes.", "translation": "空氣污染可能干擾重要認知過程。"}, "controlled laboratory setting": {"pos": "n. phrase", "definition": "受控實驗室環境", "note": "in a controlled laboratory setting", "example": "The participants inhaled fumes in a controlled laboratory setting.", "translation": "受試者在受控實驗室環境中吸入廢氣。"}, "safeguard": {"pos": "v./n.", "definition": "保護；保障措施", "note": "safeguard rights/data", "example": "New rules are intended to safeguard children's privacy.", "translation": "新規定旨在保護兒童隱私。"}, "correlation": {"pos": "n.", "definition": "相關性", "note": "correlation between A and B", "example": "The study found a strong correlation between sleep and performance.", "translation": "研究發現睡眠與表現之間有高度相關。"}, "allergic reaction": {"pos": "n. phrase", "definition": "過敏反應", "note": "trigger an allergic reaction", "example": "Pollen can trigger a severe allergic reaction in some people.", "translation": "花粉可能使某些人產生嚴重過敏反應。"}, "prolonged": {"pos": "adj.", "definition": "持續很久的；延長的", "note": "prolonged exposure/period", "example": "prolonged exposure to noise can damage hearing.", "translation": "長期暴露於噪音可能損害聽力。"}, "underlying cause": {"pos": "n. phrase", "definition": "根本原因", "note": "identify the underlying cause", "example": "Doctors are still searching for the underlying cause of the symptoms.", "translation": "醫師仍在尋找這些症狀的根本原因。"}, "adversary": {"pos": "n.", "definition": "對手；敵手", "note": "formidable adversary", "example": "The virus proved to be a difficult adversary for researchers.", "translation": "這種病毒成為研究人員難以對付的敵手。"}, "trigger": {"pos": "v./n.", "definition": "引發；觸發因素", "note": "trigger a reaction/attack", "example": "Stress can trigger asthma attacks in some patients.", "translation": "壓力可能引發某些病人的氣喘。"}, "midterm exam": {"pos": "n. phrase", "definition": "期中考", "note": "take a midterm exam", "example": "Students designed special hats for the engineering midterm exam.", "translation": "學生為工程期中考設計特殊帽子。"}, "integrity": {"pos": "n.", "definition": "誠信；完整性", "note": "academic integrity", "example": "The professor emphasized academic integrity during examinations.", "translation": "教授強調考試期間的學術誠信。"}, "anti-cheating": {"pos": "adj.", "definition": "防作弊的", "note": "anti-cheating measure", "example": "The school introduced an unusual anti-cheating device for exams.", "translation": "學校在考試中採用一種特別的防作弊裝置。"}, "enthusiasm": {"pos": "n.", "definition": "熱情", "note": "show enthusiasm for", "example": "Students embraced the project with great enthusiasm.", "translation": "學生非常熱情地接受這項計畫。"}, "personalized": {"pos": "adj.", "definition": "個人化的", "note": "personalized service/plan", "example": "Each student created a personalized study plan.", "translation": "每位學生都制定個人化讀書計畫。"}, "high-pressure": {"pos": "adj.", "definition": "高壓的", "note": "high-pressure situation", "example": "Exams can create a high-pressure environment for students.", "translation": "考試可能為學生造成高壓環境。"}, "peer-reviewed": {"pos": "adj.", "definition": "經同儕審查的", "note": "peer-reviewed article/journal", "example": "The results appeared in a peer-reviewed journal.", "translation": "研究結果刊登於經同儕審查的期刊。"}, "copyrighted": {"pos": "adj./p.p.", "definition": "受著作權保護的", "note": "copyrighted material", "example": "The website removed the copyrighted material.", "translation": "該網站移除受著作權保護的內容。"}, "discontinued": {"pos": "adj./p.p.", "definition": "停止的；停產的", "note": "discontinue a product/service", "example": "The company discontinued the product because of safety concerns.", "translation": "公司因安全疑慮停止該產品。"}, "controversial": {"pos": "adj.", "definition": "具爭議的", "note": "controversial issue/decision", "example": "The record attempt was highly controversial.", "translation": "這項紀錄挑戰極具爭議。"}, "objective": {"pos": "adj./n.", "definition": "客觀的；目標", "note": "objective assessment/evidence", "example": "The evaluation should be fair and objective.", "translation": "這項評估應公平且客觀。"}, "contentious": {"pos": "adj.", "definition": "具爭議的；好爭論的", "note": "contentious issue/debate", "example": "The proposal remains a contentious political issue.", "translation": "這項提案仍是具爭議的政治議題。"}, "deteriorate": {"pos": "v.", "definition": "惡化；退化", "note": "deteriorate rapidly/over time", "example": "Without maintenance, the bridge will continue to deteriorate.", "translation": "若缺乏維護，這座橋會持續惡化。"}, "unprecedented": {"pos": "adj.", "definition": "前所未有的", "note": "unprecedented growth/crisis", "example": "The city experienced unprecedented levels of rainfall.", "translation": "這座城市經歷前所未有的降雨量。"}};
let queue=[],index=0,correct=0,streak=0,answered=false,wrong=[];
const WRONGBOOK_KEY="vocabQuizWrongBookV1";
function loadWrongBook(){
  try{return JSON.parse(localStorage.getItem(WRONGBOOK_KEY)||"[]")}catch(e){return[]}
}
function saveWrongBook(items){
  localStorage.setItem(WRONGBOOK_KEY,JSON.stringify(items));
  updateWrongBookUI();
}
function wrongKey(q){
  return String(q.id||"")+"||"+String(q.sentence||"")+"||"+String(q.answer||"");
}
function addToWrongBook(q,chosen){
  const book=loadWrongBook();
  const key=wrongKey(q);
  const existing=book.find(x=>wrongKey(x)===key);
  const entry={...q,chosen:chosen||"",wrongCount:(existing?.wrongCount||0)+1,lastWrongAt:new Date().toISOString()};
  const next=book.filter(x=>wrongKey(x)!==key);
  next.unshift(entry);
  saveWrongBook(next);
}
function removeFromWrongBook(key){
  saveWrongBook(loadWrongBook().filter(x=>wrongKey(x)!==key));
}
function clearWrongBook(){
  if(confirm("確定要清空所有錯題嗎？")) saveWrongBook([]);
}
function updateWrongBookUI(){
  const book=loadWrongBook();
  $("#wrongBookCount").textContent=`${book.length} 題`;
  $("#practiceWrongBook").disabled=book.length===0;
  $("#viewWrongBook").disabled=book.length===0;
  const list=$("#wrongBookList");
  if(!list.classList.contains("hidden")) renderWrongBookList();
}
function renderWrongBookList(){
  const book=loadWrongBook();
  const list=$("#wrongBookList");
  list.innerHTML=book.length?book.map(q=>{
    const chosenInfo=INFO[q.chosen]||{};
    const answerInfo=INFO[q.answer]||{};
    return `<div class="wrongbook-card">
      <div class="wb-sentence">${esc(q.sentence)}</div>
      <div class="wb-row"><b>你上次選：</b>${esc(q.chosen||"（跳過）")} ${chosenInfo.definition?`— ${esc(chosenInfo.definition)}`:""}</div>
      <div class="wb-row"><b>正確答案：</b>${esc(q.answer)} ${answerInfo.definition?`— ${esc(answerInfo.definition)}`:""}</div>
      ${answerInfo.note?`<div class="wb-row"><b>搭配／用法：</b>${esc(answerInfo.note)}</div>`:""}
      <div class="wb-row"><b>答錯次數：</b>${q.wrongCount||1}</div>
      <div class="wb-actions">
        <button class="btn secondary wb-practice-one" data-key="${esc(wrongKey(q))}">重做這題</button>
        <button class="btn danger wb-remove" data-key="${esc(wrongKey(q))}">刪除</button>
      </div>
    </div>`;
  }).join(""):`<div class="small">目前沒有錯題 🎉</div>`;
  list.querySelectorAll(".wb-remove").forEach(b=>b.onclick=()=>removeFromWrongBook(b.dataset.key));
  list.querySelectorAll(".wb-practice-one").forEach(b=>b.onclick=()=>{
    const q=loadWrongBook().find(x=>wrongKey(x)===b.dataset.key);
    if(q) startRound([q]);
  });
}


const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function infoHtml(word){
 const x=INFO[word]||{};
 return `<span class="label">${esc(word)}</span>${x.pos?`（${esc(x.pos)}）`:""}：${esc(x.definition||"無補充中文義")}`
   +(x.note?`<br>常見搭配／用法：${esc(x.note)}`:"")
   +(x.example?`<br>例句：${esc(x.example)}`:"");
}
function allOptionsHtml(q){
  return `<div class="all-options"><b>四個選項完整解析</b>`+
    q.options.map(opt=>{
      const isCorrect=opt===q.answer;
      const reason=isCorrect
        ?"✅ 符合本句的語意、詞性與搭配。"
        :"❌ 此選項的意思、詞性或常見搭配不符合本句。";
      return `<div class="option-explain ${isCorrect?"correct-info":"wrong-info"}">
        ${infoHtml(opt)}
        <div class="why">${reason}</div>
      </div>`;
    }).join("")+`</div>`;
}
function startRound(custom){
 const n=Math.min(Number($("#count").value),BANK.length);
 queue=custom?shuffle(custom):shuffle(BANK).slice(0,n);
 index=0;correct=0;streak=0;answered=false;wrong=[];
 $("#result").classList.add("hidden");$("#quiz").classList.remove("hidden");render();
}
function render(){
 answered=false;const q=queue[index];
 $("#qmeta").textContent=`第 ${index+1} 題／共 ${queue.length} 題`;
 $("#sentence").innerHTML=esc(q.sentence).replace("______","<u>______</u>");
 $("#options").innerHTML="";
 q.options.forEach((opt,i)=>{const b=document.createElement("button");b.className="option";b.innerHTML=`<b>${String.fromCharCode(65+i)}.</b> ${esc(opt)}`;b.onclick=()=>choose(opt,b);$("#options").appendChild(b)});
 $("#feedback").className="feedback";$("#feedback").innerHTML="";$("#next").classList.add("hidden");updateStats();
}
function choose(opt,btn){
 if(answered)return;answered=true;const q=queue[index],ok=opt===q.answer;
 $$(".option").forEach(b=>{const t=b.textContent.replace(/^[A-D]\.\s*/,"").trim();if(t===q.answer)b.classList.add("correct");else if(b===btn&&!ok)b.classList.add("wrong");else b.classList.add("dim");b.disabled=true});
 if(ok){correct++;streak++; if(queue.length===1 || queue.every(x=>loadWrongBook().some(w=>wrongKey(w)===wrongKey(x)))) removeFromWrongBook(wrongKey(q));}else{streak=0;wrong.push({...q,chosen:opt});addToWrongBook(q,opt)}
 const fb=$("#feedback");fb.className="feedback show "+(ok?"good":"bad");
 if(ok){
   fb.innerHTML=`<b>✅ 正確！</b>
   <div class="small"><b>正確答案：</b><br>${infoHtml(q.answer)}
   ${q.translation?`<br>句子翻譯：${esc(q.translation)}`:""}</div>
   ${allOptionsHtml(q)}`;
 }else{
   fb.innerHTML=`<b>❌ 你選了：${esc(opt)}</b>
   <div class="wrong-explain"><b>錯誤選項解釋</b><br>${infoHtml(opt)}<br><span class="small">它的意思、詞性或搭配不符合本句。</span></div>
   <div class="wrong-explain"><b>正確答案</b><br>${infoHtml(q.answer)}${q.translation?`<br>句子翻譯：${esc(q.translation)}`:""}</div>
   ${allOptionsHtml(q)}`;
 }
 $("#next").textContent=index===queue.length-1?"看結果":"下一題";$("#next").classList.remove("hidden");updateStats();
}
function updateStats(){const done=index+(answered?1:0);$("#progressText").textContent=`${done}/${queue.length}`;$("#correctText").textContent=correct;$("#streakText").textContent=streak;$("#rateText").textContent=done?Math.round(correct/done*100)+"%":"0%";$("#bar").style.width=(done/queue.length*100)+"%"}
function nextQ(){if(index<queue.length-1){index++;render()}else finish()}
function finish(){$("#quiz").classList.add("hidden");$("#result").classList.remove("hidden");$("#score").textContent=`${correct} / ${queue.length}`;$("#summary").textContent=`正確率 ${Math.round(correct/queue.length*100)}%，錯題 ${wrong.length} 題。`;$("#retryWrong").classList.toggle("hidden",!wrong.length);
$("#wrongList").innerHTML=wrong.length?"<h3>錯題整理</h3>"+wrong.map(q=>`<div class="wrong-item"><b>題目：</b>${esc(q.sentence)}<br><b>你選：</b>${esc(q.chosen)} — ${esc((INFO[q.chosen]||{}).definition||"")}<br><b>答案：</b>${esc(q.answer)} — ${esc((INFO[q.answer]||{}).definition||"")}</div>`).join(""):"<p>全對，太猛了 🔥</p>"}
$("#next").onclick=nextQ;$("#skip").onclick=()=>{if(!answered){wrong.push({...queue[index],chosen:"（跳過）"});addToWrongBook(queue[index],"（跳過）")}nextQ()};$("#newRound").onclick=()=>startRound();$("#again").onclick=()=>startRound();$("#retryWrong").onclick=()=>startRound(wrong);
$("#practiceWrongBook").onclick=()=>{
  const book=loadWrongBook();
  if(book.length) startRound(book);
};
$("#viewWrongBook").onclick=()=>{
  $("#wrongBookList").classList.toggle("hidden");
  if(!$("#wrongBookList").classList.contains("hidden")) renderWrongBookList();
};
$("#clearWrongBook").onclick=clearWrongBook;
updateWrongBookUI();
startRound();
</script></body></html>
